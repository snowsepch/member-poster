<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>右昌 會員優惠 海報・簡約大字版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --poster-bg:#FFFFFF;     /* 純白底，高對比好識別 */
  --ink:#1A1A1A;           /* 黑硬邊線 / 主文字 */
  --line:#1A1A1A;
  --offer:#C8442E;         /* 單一強調色：折扣 */
  --muted:#6b6760;
  --orig:#9a958c;
  --card:#ffffff;
  --ctrl:#f3f1ec;--ctrl2:#e9e6df;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:#cfccc4;min-height:100vh;}

/* ── 控制列 ── */
.cbar{background:var(--ctrl);padding:9px 16px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;border-bottom:1px solid #c9c5bc;}
.pbadge{font-size:13px;font-weight:900;color:var(--ink);white-space:nowrap;margin-right:6px;}
.pbadge em{font-style:normal;color:var(--offer);}
#pfi{display:none;}
.bbtn{display:flex;align-items:center;gap:5px;padding:7px 14px;border:2px solid var(--ink);background:#fff;color:var(--ink);font-size:12.5px;font-weight:900;font-family:'Noto Sans TC',sans-serif;cursor:pointer;white-space:nowrap;transition:all .12s;}
.bbtn:hover{background:#f0ede6;}
.bbtn.pdf{background:var(--ink);color:#fff;}
.bbtn.pdf:hover{background:#000;}
.bbtn.prt{background:var(--offer);border-color:var(--offer);color:#fff;}
.bbtn.prt:hover{filter:brightness(.93);}
.bstat{font-size:11.5px;color:var(--muted);font-weight:700;}
.scwrap{display:flex;align-items:center;gap:6px;margin-left:auto;}
.scwrap label{font-size:11px;color:var(--muted);font-weight:700;}
input[type=range]{-webkit-appearance:none;width:120px;height:4px;background:#bdb9b0;border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--ink);cursor:pointer;}
#vsc{font-size:11px;color:var(--muted);font-weight:700;min-width:34px;}

.hint{background:var(--ctrl2);padding:7px 16px;font-size:11px;color:#55514a;line-height:1.55;}
.hint b{color:var(--ink);}
.hint .r{color:var(--offer);font-weight:900;}

/* ── 預覽區 ── */
#pa{display:flex;justify-content:center;padding:24px 16px 80px;}
#psw{transform-origin:top center;transition:transform .2s;}
.poster-wrap{margin-bottom:30px;}
.poster-wrap:last-child{margin-bottom:0;}
.poster-ctrl{width:794px;background:#fff;border:2px solid var(--ink);border-bottom:none;padding:8px 16px;display:flex;align-items:center;gap:12px;}
.pctrl-name{font-size:13px;font-weight:900;color:var(--ink);min-width:120px;}
.pctrl-range{-webkit-appearance:none;width:170px;height:4px;background:#cfccc4;border-radius:2px;outline:none;cursor:pointer;}
.pctrl-range::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--ink);cursor:pointer;}
.pctrl-val{font-size:12px;color:var(--ink);font-weight:900;min-width:44px;text-align:right;}
.pctrl-sub{font-size:10.5px;color:var(--muted);flex:1;}

/* ── 海報本體 A4 ── */
.poster{width:794px;height:1032px;display:flex;flex-direction:column;background:var(--poster-bg);overflow:hidden;outline:2px solid var(--ink);position:relative;}

/* 頁首 */
.store-bar{background:var(--ink);padding:18px 34px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.store-l{display:flex;flex-direction:column;gap:2px;}
.sname{font-size:26px;font-weight:900;color:#fff;letter-spacing:.02em;outline:none;line-height:1.1;}
.ssub{font-size:12.5px;color:#fff;opacity:.62;letter-spacing:.06em;outline:none;}
.sdate{font-size:23px;font-weight:900;color:#fff;background:var(--offer);padding:7px 16px;letter-spacing:.03em;outline:none;white-space:nowrap;}

/* 分類大標 */
.cat-banner{background:var(--cat,#DCE8F5);border-bottom:3px solid var(--ink);padding:13px 34px;display:flex;align-items:baseline;gap:16px;flex-shrink:0;}
.cat-title{font-size:34px;font-weight:900;color:var(--ink);letter-spacing:.01em;outline:none;line-height:1;}
.cat-tag{font-size:15px;font-weight:900;color:#fff;background:var(--ink);padding:5px 12px;outline:none;}

/* 服務列 */
.svcbar{display:grid;grid-template-columns:repeat(4,1fr);flex-shrink:0;border-bottom:2px solid var(--ink);background:#fff;}
.svc{display:flex;align-items:center;justify-content:center;padding:11px 6px;border-right:2px solid var(--ink);font-size:16px;font-weight:900;color:var(--ink);outline:none;line-height:1.25;text-align:center;white-space:nowrap;}
.svc:last-child{border-right:none;}

/* 產品區（--fs 由自動配置計算填滿 A4） */
.poster-products{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;padding:0 18px;--fs:1;}

/* 產品卡 */
.pcol{border:2.5px solid var(--ink);margin-top:calc(12px*var(--fs));flex-shrink:0;background:var(--card);overflow:hidden;display:flex;flex-direction:column;}
.pcol:first-child{margin-top:calc(14px*var(--fs));}
.pcol:last-child{margin-bottom:calc(12px*var(--fs));}
.pcol-head{background:var(--cat,#DCE8F5);padding:calc(10px*var(--fs)) 16px;display:flex;justify-content:space-between;align-items:center;gap:calc(6px*var(--fs)) 10px;flex-wrap:wrap;border-bottom:2.5px solid var(--ink);}
.pname{font-size:calc(26px*var(--fs));font-weight:900;color:var(--ink);outline:none;flex-shrink:0;line-height:1.05;}
.pact{font-size:calc(17px*var(--fs));font-weight:900;color:#fff;background:var(--offer);padding:calc(5px*var(--fs)) calc(12px*var(--fs));outline:none;white-space:nowrap;text-align:right;cursor:text;margin-left:auto;}
.pact:empty{background:transparent;color:#b3aea4;border:1.5px dashed #c4bfb5;font-weight:700;font-size:calc(13px*var(--fs));padding:calc(3px*var(--fs)) calc(8px*var(--fs));}
.pact:empty::before{content:attr(data-ph);}
.pcol-body{padding:calc(11px*var(--fs)) 16px calc(12px*var(--fs));flex:1;display:flex;flex-direction:column;justify-content:flex-start;}
.pspecs{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:calc(10px*var(--fs)) 18px;}
.pspec{position:relative;}
.pspec-cap{font-size:calc(16px*var(--fs));font-weight:700;color:var(--muted);margin-bottom:calc(2px*var(--fs));outline:none;}
.pspec-price{font-size:calc(33px*var(--fs));font-weight:900;color:var(--ink);outline:none;line-height:1.05;}
.pspec-sub{font-size:calc(14px*var(--fs));color:var(--orig);outline:none;margin-top:calc(1px*var(--fs));}
.pspec-sub s{color:var(--orig);}
.pspec-sub b{color:var(--offer);font-weight:900;}
.spec-del{position:absolute;top:0;right:0;background:none;border:none;color:#c44;font-size:11px;cursor:pointer;opacity:.35;}
.spec-del:hover{opacity:1;}
.spec-add{display:inline-block;background:none;border:1px dashed #c4bfb5;color:#a8a299;cursor:pointer;font-size:10px;font-family:'Noto Sans TC',sans-serif;padding:3px 9px;margin-top:8px;}
.spec-add:hover{border-color:var(--ink);color:var(--ink);}

/* iPad 兩兩並排 */
.pgrid-pair{display:grid;grid-template-columns:1fr 1fr;gap:0 14px;align-items:stretch;}
.pgrid-pair .pcol{margin-top:calc(12px*var(--fs));}

.no-items{padding:60px 24px;text-align:center;font-size:20px;font-weight:700;color:var(--muted);}

/* 頁尾 */
.pfoot{background:var(--ink);padding:14px 34px;flex-shrink:0;}
.fnote{font-size:15px;color:#fff;opacity:.8;line-height:1.55;outline:none;text-align:center;font-weight:500;}

@media screen{#print-only{display:none;}}
@media print{
  /* 列印一律走 ③ 按鈕的隱藏 iframe；萬一誤按 ⌘P，至少隱藏操作列、不要整頁空白 */
  .cbar,.hint,#rbtn,#rpanel,#errbar{display:none!important;}
  #pa{padding:0!important;}
  #psw{transform:none!important;}
  [contenteditable]{outline:none!important;}
}
</style>
</head>
<body>

<div class="cbar">
  <span class="pbadge">右昌 <em>會員優惠</em>・簡約大字版 <span style="color:#C8442E;">v12（iframe 列印）</span></span>
  <input type="file" id="pfi" accept=".pdf">
  <button class="bbtn pdf" onclick="document.getElementById('pfi').click()">① 選擇操盤 PDF</button>
  <button class="bbtn" onclick="fixAndFitPosters()">② 自動放大配置</button>
  <button class="bbtn prt" onclick="doPrint()">③ 列印 / 存 PDF</button>
  <button class="bbtn" onclick="saveLayout()">儲存版面</button>
  <span class="bstat" id="pstat">請先上傳操盤 PDF</span>
  <div class="scwrap">
    <label>畫面</label>
    <input type="range" id="scslider" min="40" max="110" value="68" oninput="applyZoom(this.value)">
    <span id="vsc">68%</span>
  </div>
</div>

<div class="hint">
  🖨 <b>列印設定（Safari）：</b>下方 Safari 區塊 <span class="r">「列印背景」務必打勾</span>（不勾色塊黑底不會印）、「列印標頭和註腳」不勾；縮放維持 <b>100%</b>。已自動縮放至 A4 單頁，共 <b>5 頁</b>（每類一張），不會再有空白頁。
</div>

<div id="pa"><div id="psw"><div id="posters-wrap"></div></div></div>

<button id="rbtn" onclick="toggleR()" style="position:fixed;bottom:16px;right:16px;z-index:9999;background:#1A1A1A;color:#cfccc4;border:2px solid #000;border-radius:0;padding:8px 14px;font-size:12px;font-family:'Noto Sans TC',sans-serif;font-weight:900;cursor:pointer;">回報問題</button>
<div id="rpanel" style="display:none;position:fixed;bottom:54px;right:16px;z-index:9999;background:#fff;border:2px solid #1A1A1A;padding:14px;width:230px;font-family:'Noto Sans TC',sans-serif;">
  <h4 style="font-size:13px;font-weight:900;color:#1A1A1A;margin-bottom:10px;">回報問題</h4>
  <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:9px;">
    <label style="font-size:12px;color:#55514a;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="rt" value="抓不到價格" checked> 抓不到價格 / 漏商品</label>
    <label style="font-size:12px;color:#55514a;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="rt" value="價格錯誤"> 價格 / 活動文字錯誤</label>
    <label style="font-size:12px;color:#55514a;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="rt" value="顯示異常"> 排版 / 列印異常</label>
    <label style="font-size:12px;color:#55514a;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="rt" value="其他"> 其他</label>
  </div>
  <textarea id="rmsg" placeholder="說明狀況（選填）" style="width:100%;height:54px;border:1.5px solid #1A1A1A;padding:6px 8px;font-size:12px;font-family:'Noto Sans TC',sans-serif;color:#1A1A1A;resize:none;box-sizing:border-box;margin-bottom:8px;outline:none;"></textarea>
  <button id="rsub" onclick="sendR()" style="width:100%;background:#1A1A1A;color:#fff;border:none;padding:8px;font-size:12px;font-family:'Noto Sans TC',sans-serif;font-weight:900;cursor:pointer;">送出回報</button>
  <div id="rok" style="display:none;text-align:center;padding:7px 0;font-size:12px;color:#2c8a63;font-weight:900;">✅ 已送出，謝謝！</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ── 錯誤可視化：任何未捕捉錯誤都顯示在畫面上方紅條，避免「畫面整個消失」卻看不到原因 ── */
function showErr(msg){
  let bar=document.getElementById('errbar');
  if(!bar){bar=document.createElement('div');bar.id='errbar';
    bar.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:#C8442E;color:#fff;font-family:sans-serif;font-size:13px;font-weight:700;line-height:1.5;padding:10px 40px 10px 16px;white-space:pre-wrap;box-shadow:0 2px 10px rgba(0,0,0,.3);';
    const x=document.createElement('button');x.textContent='✕';
    x.style.cssText='position:absolute;top:8px;right:10px;background:none;border:none;color:#fff;font-size:16px;font-weight:900;cursor:pointer;';
    x.onclick=()=>bar.remove();bar.appendChild(x);
    document.body.appendChild(bar);}
  bar.firstChild?bar.insertBefore(document.createTextNode(msg+'\n'),bar.firstChild):bar.appendChild(document.createTextNode(msg));
}
window.addEventListener('error',e=>{showErr('錯誤：'+(e.message||'')+(e.filename?(' @ '+e.filename.split('/').pop()+':'+e.lineno):''));});
window.addEventListener('unhandledrejection',e=>{showErr('未處理的 Promise 錯誤：'+(e.reason&&e.reason.message||e.reason||''));});

/* ── 五張海報設定（只對應指定產品線）── */
const POSTER_CFG=[
  {id:'iphone',label:'iPhone',cat:'#DCE8F5',tag:'17 系列',groups:['iPhone'],
   svc:['本店購買・免費移機','可使用・舊換新','分期 0 利率','搭配 AppleCare 安心']},
  {id:'ipad',label:'iPad Wi-Fi',cat:'#E7E0F2',tag:'Wi-Fi 機型',groups:['iPad'],
   svc:['本店購買・免費移機','可使用・舊換新','分期 0 利率','學生・教育價洽詢']},
  {id:'mac',label:'MacBook',cat:'#DCEEE2',tag:'筆電全系列',groups:['Mac'],
   svc:['本店購買・免費移機','可使用・舊換新','分期 0 利率','學生・教育價洽詢']},
  {id:'watch',label:'Apple Watch',cat:'#F7E6D6',tag:'GPS ・ Ultra',groups:['Apple Watch'],
   svc:['本店購買・免費移機','可使用・舊換新','分期 0 利率','搭配保固更划算']},
  {id:'acc',label:'AirPods & AirTag',cat:'#F7DEE5',tag:'隨身配件',groups:['配件'],
   svc:['搭配保固更划算','可使用・舊換新','分期 0 利率','加購主機更優惠']},
];
const GRP_LABEL={'iPhone':'iPhone','Mac':'MacBook','iPad':'iPad Wi-Fi','Apple Watch':'Apple Watch','配件':'AirPods & AirTag'};

/* ── 只辨識這些產品 ── */
const CATS=[
  /* iPhone：只留 17 系列 */
  {k:'iPhone 17 Pro Max',lbl:'iPhone 17 Pro Max',grp:'iPhone'},
  {k:'iPhone 17 Pro',lbl:'iPhone 17 Pro',grp:'iPhone'},
  {k:'iPhone 17e',lbl:'iPhone 17e',grp:'iPhone'},
  {k:'iPhone 17',lbl:'iPhone 17',grp:'iPhone'},
  /* MacBook 系列 */
  {k:'13吋MBN',lbl:'MacBook Neo 13"',grp:'Mac',actKey:'MacBook Neo'},
  {k:'13.6吋MBA',lbl:'MacBook Air 13"',grp:'Mac',actKey:'MacBook Air 13'},
  {k:'15.3吋MBA',lbl:'MacBook Air 15"',grp:'Mac',actKey:'MacBook Air 15'},
  {k:'14.2吋MBP',lbl:'MacBook Pro 14"',grp:'Mac',actKey:'MacBook Pro 14'},
  {k:'16.2吋MBP',lbl:'MacBook Pro 16"',grp:'Mac',actKey:'MacBook Pro 16'},
  /* iPad：Wi-Fi 機型（LTE 一律排除） */
  {k:'iPad Pro 13',lbl:'iPad Pro 13"',grp:'iPad'},
  {k:'iPad Pro 11',lbl:'iPad Pro 11"',grp:'iPad'},
  {k:'iPad Air 13吋',lbl:'iPad Air 13"',grp:'iPad'},
  {k:'iPad Air 11吋',lbl:'iPad Air 11"',grp:'iPad'},
  {k:'iPad mini',lbl:'iPad mini',grp:'iPad'},
  {k:'iPad 11',lbl:'iPad 11"',grp:'iPad'},
  /* Apple Watch：GPS 系列 + Ultra 系列 */
  {k:'AW Ultra',lbl:'Apple Watch Ultra 3',grp:'Apple Watch'},
  {k:'AW S11',lbl:'Apple Watch S11',grp:'Apple Watch'},
  {k:'AW SE',lbl:'Apple Watch SE 3',grp:'Apple Watch'},
  /* AirPods + AirTag */
  {k:'AirPods Pro 3',lbl:'AirPods Pro 3',grp:'配件'},
  {k:'AirPods 4-主動',lbl:'AirPods 4 ANC',grp:'配件'},
  {k:'AirPods 4',lbl:'AirPods 4',grp:'配件'},
  {k:'AirPods Max',lbl:'AirPods Max',grp:'配件'},
  {k:'AirTag 2-4',lbl:'AirTag 2（4 入）',grp:'配件'},
  {k:'AirTag 2-1',lbl:'AirTag 2（1 入）',grp:'配件'},
];
const EXCLUDE=['保護殼','保護貼','保護套','錶帶','鍵盤','雙面夾','Pencil','Trackpad','Mouse','Keyboard','掛繩','卡套','筆尖','編織線','USB','HomePod','展-','高山錶環','越野錶環','防護邊框','邊框','聰穎','巧控'];

/* 修正抽取時偶爾掉開頭 i */
function fixName(n){return n.replace(/^Phone\s/,'iPhone ').replace(/^Pad\s/,'iPad ').replace(/^Mac\s+(\d+吋)/,'iMac $1').trim();}

function getSpec(name){
  const awM=name.match(/\b(40|42|44|46|49)(?:mm)?\b/);
  if(awM&&(name.includes('AW ')||name.includes('Apple Watch'))){const mm=awM[1]+'mm';if(name.includes('米蘭'))return mm+' 米蘭';if(name.includes('海洋'))return mm+' 海洋';return mm;}
  if(name.match(/AirPods|AirTag/i))return'';
  const macM=name.match(/(\d+G)\/([\d.]+[GT])/i);if(macM)return macM[1]+'/'+macM[2];
  const m=name.match(/(\d+(?:\.\d+)?)\s*([GT]B?)\b/i);if(!m)return'';
  const nv=parseFloat(m[1]),u=m[2].toUpperCase();
  if(u==='T'||u==='TB')return nv+'TB';if(nv>=1000)return(nv/1000)+'TB';return nv+'G';
}
function getConn(name){
  if(/Wi-Fi\+LTE|LTE/i.test(name))return'LTE';if(/Wi-Fi/i.test(name))return'Wi-Fi';
  if(/GPS\+LTE/i.test(name))return'LTE';if(/GPS/i.test(name))return'GPS';return'';
}

function parsePDF(text){
  const allLines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
  const tokens=text.split(/\s+/).filter(t=>t.length>0);
  const lines=[];let c=[];
  for(const tok of tokens){if(/^\d{6}$/.test(tok)&&c.length>0){lines.push(c.join(' '));c=[tok];}else c.push(tok);}
  if(c.length>0)lines.push(c.join(' '));
  const rows=[];
  const re=/^(\d{6})\s+(.+?)\s+([A-Z][A-Z0-9]{5,}(?:\/[A-Z])?)\s+([\d,]+)(?:\s+([\d,]+)\s+([\d,]+))?/;
  for(const line of lines){const m=line.match(re);if(m){const mp=parseInt(m[4].replace(/,/g,'')),pp=m[6]?parseInt(m[6].replace(/,/g,'')):0;if(mp>500&&mp<300000)rows.push({name:fixName(m[2].trim()),memberPrice:mp,promoPrice:pp||mp});}}
  function cleanAct(al){const m=al.match(/[（(](.+?)[）)]/);if(m){const t=m[1].replace(/^(活動|注意)[：:]\s*/,'').trim();if(t.length>=2)return t.slice(0,40);}const kw=al.match(/(現折|滿萬|再送|附贈|加購)[^\s，。；]{1,30}/);if(kw)return kw[0].trim().slice(0,34);return al.replace(/\s*(貨號|品名|型號|會員價|折讓額|促銷價).*/,'').trim().slice(0,34);}
  function findCat(line){let best=null,bestLen=0;for(const cat of CATS){const keys=[cat.k,cat.lbl];if(cat.actKey)keys.push(cat.actKey);for(const key of keys){if(key.length<=bestLen)continue;const idx=line.indexOf(key);if(idx<0)continue;if(/[^\x00-\x7F]/.test(key)){bestLen=key.length;best=cat;continue;}const rest=line.slice(idx+key.length);if(!rest[0]||rest[0]===' '||!/[a-zA-Z\d]/.test(rest[0])){bestLen=key.length;best=cat;}}}return best;}
  const actMap={};let ctxCat=null;
  for(const line of allLines){if(/^\d{6}/.test(line))continue;const catInLine=findCat(line);if(catInLine)ctxCat=catInLine;const hasAct=/[（(]/.test(line)||/現折|滿萬|再送|附贈|贈品|加購|注意|送配件金/.test(line);if(hasAct&&line.length>3&&line.length<160){const target=catInLine||ctxCat;if(target&&!actMap[target.lbl])actMap[target.lbl]=cleanAct(line);}}
  const EXCL_WATCH=EXCLUDE.filter(k=>k!=='錶帶');
  const grouped={};
  for(const row of rows){
    if(row.name.startsWith('展-'))continue;
    let matched=null;for(const cat of CATS){if(row.name.includes(cat.k)||row.name.includes(cat.lbl)){matched=cat;break;}}
    if(!matched)continue;
    /* 配件不套價格門檻（AirTag 等低價品保留） */
    if(matched.grp!=='配件'&&row.promoPrice<3000&&row.memberPrice<3000)continue;
    const excl=matched.grp==='Apple Watch'?EXCL_WATCH:EXCLUDE;if(excl.some(k=>row.name.includes(k)))continue;
    const conn=getConn(row.name);
    const spec=getSpec(row.name);
    /* iPad：只留 Wi-Fi，LTE / Cellular 排除 */
    if(matched.grp==='iPad'&&(conn==='LTE'||/[Cc]ellular/.test(row.name)))continue;
    /* iPad 容量精簡：mini / 11 留 128/256；Air 只留 M4 的 128/256；Pro 留 256/512 */
    if((matched.k==='iPad mini'||matched.k==='iPad 11')&&!['128G','256G'].includes(spec))continue;
    if(matched.lbl.startsWith('iPad Air')&&(!/M4/.test(row.name)||!['128G','256G'].includes(spec)))continue;
    if(matched.lbl.startsWith('iPad Pro')&&!['256G','512G'].includes(spec))continue;
    /* Apple Watch：只留 GPS（SE/S11 排除 LTE）；Ultra 只留米蘭/海洋一款代表 */
    if((matched.k==='AW SE'||matched.k==='AW S11')&&conn==='LTE')continue;
    if(matched.k==='AW Ultra'){if(!spec.includes('米蘭')&&!spec.includes('海洋'))continue;}
    const lbl=matched.lbl;
    if(!grouped[lbl])grouped[lbl]={grp:matched.grp,lbl,specs:[],act:actMap[lbl]||''};
    const price=row.promoPrice,orig=row.memberPrice;
    const noSpecOk=matched.grp==='配件';
    if(!spec&&!noSpecOk)continue;
    const key=spec+(conn&&conn!=='Wi-Fi'?'|'+conn:'');
    const exist=grouped[lbl].specs.find(s=>s.key===key);
    if(exist){if(price<exist.price){exist.price=price;exist.orig=orig;}}
    else grouped[lbl].specs.push({key,spec,conn,price,orig});
  }
  /* 每款依價格排序、上限 4 個規格，畫面清爽好讀 */
  for(const lbl in grouped){
    grouped[lbl].specs.sort((a,b)=>a.price-b.price);
    grouped[lbl].specs=grouped[lbl].specs.slice(0,4);
  }
  return grouped;
}
function fmt(n){return isFinite(n)?'$'+n.toLocaleString('zh-TW'):'—';}

/* ── 海報模板 ── */
function makePoster(cfg,dateStr,productsHTML){
  return `
<div class="poster-wrap" id="wrap-${cfg.id}">
  <div class="poster-ctrl">
    <span class="pctrl-name">▶ ${cfg.label}</span>
    <input class="pctrl-range" type="range" id="pctrl-${cfg.id}" min="55" max="100" value="100" oninput="setPosterZoom('${cfg.id}',this.value)">
    <span class="pctrl-val" id="pctrl-val-${cfg.id}">100%</span>
    <span class="pctrl-sub">← 列印縮放（一般免動，已自動配置）</span>
  </div>
  <div class="poster" id="poster-${cfg.id}" style="--cat:${cfg.cat}">
    <div class="store-bar">
      <div class="store-l">
        <span class="sname" contenteditable="true">右昌 Apple Shop</span>
        <span class="ssub" contenteditable="true">Apple 授權經銷・會員專屬優惠</span>
      </div>
      <span class="sdate" contenteditable="true">${dateStr}</span>
    </div>
    <div class="cat-banner">
      <span class="cat-title" contenteditable="true">${cfg.label}</span>
      <span class="cat-tag" contenteditable="true">${cfg.tag}</span>
    </div>
    <div class="svcbar">
      ${cfg.svc.map(s=>`<div class="svc" contenteditable="true">${s}</div>`).join('')}
    </div>
    <div class="poster-products">
      ${productsHTML||'<div class="no-items">請上傳操盤 PDF 自動產生價格</div>'}
    </div>
    <div class="pfoot">
      <div class="fnote" contenteditable="true">分期 0 利率：3／6／12 期，限持有效信用卡　●　活動期間如有異動，以現場公告為準</div>
    </div>
  </div>
</div>`;
}
function colHTML(item,cols){
  const n=cols||Math.max(1,item.specs.length);
  const actHTML=`<span class="pact" contenteditable="true" data-ph="＋活動">${item.act||''}</span>`;
  const specItems=item.specs.map(s=>{
    const cap=[s.spec,(s.conn&&s.conn!=='Wi-Fi'?s.conn:'')].filter(Boolean).join(' ');
    const capHTML=cap?`<div class="pspec-cap" contenteditable="true">${cap}</div>`:'';
    const save=s.orig-s.price;
    const subHTML=save>0?`<div class="pspec-sub" contenteditable="true">原價 <s>${fmt(s.orig)}</s><br>省 <b>${fmt(save)}</b></div>`:'';
    return`<div class="pspec">${capHTML}<div class="pspec-price" contenteditable="true">${fmt(s.price)}</div>${subHTML}<button class="spec-del" onclick="this.closest('.pspec').remove()">✕</button></div>`;
  }).join('');
  return`<div class="pcol"><div class="pcol-head"><div class="pname" contenteditable="true">${item.lbl}</div>${actHTML}</div><div class="pcol-body"><div class="pspecs" style="grid-template-columns:repeat(${n},1fr)">${specItems}</div><button class="spec-add" onclick="addSpec(this)">＋ 規格</button></div></div>`;
}
function buildGroupHTML(grouped,groups){
  let html='';
  for(const g of groups){
    const items=Object.values(grouped).filter(i=>i.grp===g);if(!items.length)continue;
    /* 同一頁所有卡片用相同欄位數 → 256G/512G/1TB 各欄上下對齊 */
    const cols=Math.max(1,...items.map(i=>i.specs.length||1));
    if(g==='iPad'){
      const order=['iPad mini','iPad 11"','iPad Air 11"','iPad Air 13"','iPad Pro 11"','iPad Pro 13"'];
      const sorted=items.slice().sort((a,b)=>{const ia=order.indexOf(a.lbl),ib=order.indexOf(b.lbl);return(ia<0?99:ia)-(ib<0?99:ib);});
      for(let i=0;i<sorted.length;i+=2){const a=sorted[i],b=sorted[i+1];if(b)html+=`<div class="pgrid-pair">${colHTML(a,cols)}${colHTML(b,cols)}</div>`;else html+=colHTML(a,cols);}
    }else if(g==='配件'){
      /* 配件兩兩並排，省空間又大字 */
      const order=['AirPods Pro 3','AirPods 4 ANC','AirPods 4','AirPods Max','AirTag 2（1 入）','AirTag 2（4 入）'];
      const sorted=items.slice().sort((a,b)=>{const ia=order.indexOf(a.lbl),ib=order.indexOf(b.lbl);return(ia<0?99:ia)-(ib<0?99:ib);});
      for(let i=0;i<sorted.length;i+=2){const a=sorted[i],b=sorted[i+1];if(b)html+=`<div class="pgrid-pair">${colHTML(a,cols)}${colHTML(b,cols)}</div>`;else html+=colHTML(a,cols);}
    }else{
      const order=['iPhone 17e','iPhone 17','iPhone 17 Pro','iPhone 17 Pro Max',
                   'MacBook Neo 13"','MacBook Air 13"','MacBook Air 15"','MacBook Pro 14"','MacBook Pro 16"',
                   'Apple Watch SE 3','Apple Watch S11','Apple Watch Ultra 3'];
      const sorted=items.slice().sort((a,b)=>{const ia=order.indexOf(a.lbl),ib=order.indexOf(b.lbl);return(ia<0?99:ia)-(ib<0?99:ib);});
      sorted.forEach(item=>html+=colHTML(item,cols));
    }
  }
  return html;
}
function initPosters(){
  document.getElementById('posters-wrap').innerHTML=POSTER_CFG.map(cfg=>makePoster(cfg,'活動日期','')).join('');
}

/* ── PDF 解析入口 ── */
document.getElementById('pfi').addEventListener('change',async function(){
  const file=this.files[0];if(!file)return;
  const st=document.getElementById('pstat');st.textContent='解析中…';st.style.color='var(--muted)';
  try{
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let fullText='';
    for(let p=1;p<=pdf.numPages;p++){
      const pg=await pdf.getPage(p);const tc=await pg.getTextContent();
      const lineMap=new Map();
      for(const item of tc.items){
        const y=Math.round(item.transform[5]);let found=null;
        for(const [ky] of lineMap){if(Math.abs(ky-y)<=2){found=ky;break;}}
        const key=found!==null?found:y;
        if(!lineMap.has(key))lineMap.set(key,[]);
        lineMap.get(key).push({x:Math.round(item.transform[4]),str:item.str});
      }
      const sorted=[...lineMap.entries()].sort((a,b)=>b[0]-a[0]);
      for(const [,parts] of sorted){parts.sort((a,b)=>a.x-b.x);fullText+=parts.map(p=>p.str).join(' ')+'\n';}
    }
    const fname=file.name.replace('.pdf','');const dm=fname.match(/(\d{4})-(\d{4})/);
    const dateStr=dm?(()=>{const f=d=>`${d.slice(0,2)}/${d.slice(2)}`;return`${f(dm[1])} ─ ${f(dm[2])}`;})():'活動日期';
    const grouped=parsePDF(fullText);
    document.getElementById('posters-wrap').innerHTML=POSTER_CFG.map(cfg=>makePoster(cfg,dateStr,buildGroupHTML(grouped,cfg.groups))).join('');
    document.querySelectorAll('.sname').forEach(el=>el.textContent=_storeId);
    const total=Object.keys(grouped).length;
    st.textContent='✓ '+file.name+'（'+total+' 款）';st.style.color='#2c8a63';
    document.fonts.ready.then(()=>fixAndFitPosters());
  }catch(e){st.textContent='⚠️ 解析失敗：'+e.message;st.style.color='#C8442E';console.error(e);}
});

function addSpec(btn){
  const grid=btn.previousElementSibling;if(!grid||!grid.classList.contains('pspecs'))return;
  const item=document.createElement('div');item.className='pspec';
  item.innerHTML='<div class="pspec-cap" contenteditable="true">容量</div><div class="pspec-price" contenteditable="true">$—</div><button class="spec-del" onclick="this.closest(\'.pspec\').remove()">✕</button>';
  grid.appendChild(item);item.querySelector('.pspec-cap').focus();
}

/* ── 自動放大配置：依內容量自動算 --fs，填滿 A4，免手動調字 ── */
const posterScales={};
function setPosterZoom(id,pct){
  posterScales[id]=Number(pct);
  const poster=document.getElementById('poster-'+id);if(!poster)return;
  poster.style.zoom=pct<100?String(pct/100):'';
  const lbl=document.getElementById('pctrl-val-'+id);if(lbl)lbl.textContent=pct+'%';
  const slider=document.getElementById('pctrl-'+id);if(slider)slider.value=pct;
}
function fixAndFitPosters(){
  const TARGET=1032, FS_MIN=0.7, FS_MAX=1.9;
  POSTER_CFG.forEach(cfg=>{
    const poster=document.getElementById('poster-'+cfg.id);if(!poster)return;
    poster.style.zoom='';setPosterZoom(cfg.id,100);
    const products=poster.querySelector('.poster-products');if(!products)return;
    products.style.flex='none';products.style.height='auto';products.style.maxHeight='none';
    products.style.overflow='visible';products.style.justifyContent='flex-start';products.style.minHeight='0';
    products.style.setProperty('--fs','1');void poster.offsetHeight;
    let fixedH=0;poster.querySelectorAll('.store-bar,.cat-banner,.svcbar,.pfoot').forEach(el=>{fixedH+=el.offsetHeight;});
    const availH=Math.max(80,TARGET-fixedH-2);
    const hasCards=!!poster.querySelector('.pcol');
    let fs=1;
    if(hasCards){
      for(let i=0;i<8;i++){
        products.style.setProperty('--fs',fs.toFixed(3));void products.offsetHeight;
        const contentH=products.offsetHeight;if(contentH<=0)break;
        const ratio=availH/contentH;if(ratio>0.99&&ratio<1.01)break;
        fs=Math.max(FS_MIN,Math.min(FS_MAX,fs*ratio));
      }
      products.style.setProperty('--fs',fs.toFixed(3));
    }
    void products.offsetHeight;const finalH=products.offsetHeight;
    products.style.height=availH+'px';products.style.maxHeight=availH+'px';products.style.overflow='hidden';
    products.style.justifyContent=(finalH<availH-4)?'space-between':'flex-start';
  });
  const st=document.getElementById('pstat');
  if(st&&st.textContent.indexOf('｜')<0&&st.textContent.indexOf('✓')===0)st.textContent+=' ｜ 已自動放大填滿 A4';
}

/* ── 列印（v12：寫入隱藏 iframe 只印該 iframe，主視窗完全不進列印模式 → 螢幕不會變空白；
       iframe 內用「縮放後尺寸頁框＋transform 縮放」確保 Safari 不空白、不多頁）── */
function stripPrintMedia(css){
  const i=css.indexOf('@media print');if(i<0)return css;
  let k=css.indexOf('{',i),depth=0;
  for(;k<css.length;k++){if(css[k]==='{')depth++;else if(css[k]==='}'){depth--;if(depth===0){k++;break;}}}
  return css.slice(0,i)+css.slice(k);
}
function doPrint(){
  try{
    fixAndFitPosters();void document.body.offsetHeight;
    const S=0.9,PW=794,PH=1032;
    let body='';
    POSTER_CFG.forEach(cfg=>{
      const poster=document.getElementById('poster-'+cfg.id);
      if(!poster||!poster.querySelector('.pcol'))return; /* 空白頁不印 */
      const cl=poster.cloneNode(true);
      cl.querySelectorAll('.spec-del,.spec-add').forEach(e=>e.remove());
      cl.querySelectorAll('.pact').forEach(e=>{if(!e.textContent.trim())e.remove();});
      cl.querySelectorAll('[contenteditable]').forEach(e=>e.removeAttribute('contenteditable'));
      cl.style.zoom='';cl.style.transform='';cl.style.margin='';
      body+='<div class="ppage">'+cl.outerHTML+'</div>';
    });
    if(!body){showErr('尚未產生海報，請先上傳操盤 PDF。');return;}
    /* 複製頁面樣式（去掉主頁的 @media print，避免干擾 iframe 列印），再疊上乾淨列印樣式 */
    let css='';document.querySelectorAll('style').forEach(s=>{css+=stripPrintMedia(s.textContent)+'\n';});
    const printCss='*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}'+
      '@page{size:A4 portrait;margin:6mm;}'+
      'html,body{margin:0;padding:0;background:#fff;}'+
      '.ppage{width:'+(PW*S)+'px;height:'+(PH*S)+'px;overflow:hidden;margin:0 auto;background:#fff;page-break-after:always;break-after:page;}'+
      '.ppage:last-child{page-break-after:auto;break-after:auto;}'+
      '.ppage .poster{transform:scale('+S+');transform-origin:top left;outline-offset:-2px;}';
    const docHTML='<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8">'+
      '<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">'+
      '<style>'+css+'</style><style>'+printCss+'</style></head><body>'+body+'</body></html>';
    const old=document.getElementById('print-frame');if(old)old.remove();
    const ifr=document.createElement('iframe');ifr.id='print-frame';ifr.setAttribute('aria-hidden','true');
    ifr.style.cssText='position:fixed;left:-9999px;top:0;width:794px;height:1123px;border:0;opacity:0;';
    document.body.appendChild(ifr);
    let done=false;
    const fire=()=>{if(done)return;done=true;
      try{ifr.contentWindow.focus();ifr.contentWindow.print();}
      catch(e){showErr('列印失敗：'+(e&&e.message||e));}
      setTimeout(()=>{try{ifr.remove();}catch(e){}},2000);};
    ifr.onload=()=>{const w=ifr.contentWindow;
      if(w.document.fonts&&w.document.fonts.ready){w.document.fonts.ready.then(()=>setTimeout(fire,200));}
      else setTimeout(fire,500);};
    const d=ifr.contentWindow.document;d.open();d.write(docHTML);d.close();
    setTimeout(fire,2500); /* 後備：onload／字型未觸發也能印 */
  }catch(e){showErr('列印發生錯誤：'+(e&&e.message||e));}
}
/* 列印結束務必還原畫面（afterprint 為主，焦點/計時為備援，避免畫面卡在列印狀態變空白） */
function restoreScreen(){const p=document.getElementById('print-only');if(p)p.innerHTML='';try{applyZoom(_pswScale*100);}catch(e){}}
window.addEventListener('afterprint',restoreScreen);
window.addEventListener('focus',()=>{if(document.getElementById('print-only')&&document.getElementById('print-only').innerHTML)setTimeout(restoreScreen,80);});

/* ── 畫面縮放 ── */
let _pswScale=0.68;
function applyZoom(v){_pswScale=v/100;document.getElementById('psw').style.transform=`scale(${v/100})`;document.getElementById('vsc').textContent=v+'%';}

/* ── 多門市 / 回報 ── */
const _rawStore=decodeURIComponent(new URLSearchParams(location.search).get('store')||'');
const _storeId=_rawStore?_rawStore.replace(/^燦坤/,'').replace(/店$/,'')+' Apple Shop':'右昌 Apple Shop';
const API='https://script.google.com/macros/s/AKfycbyiX43HQKr48-rd7DZSm5u9KP-uoeT6DagKrPYPs-G4lE5mnpf1yHUb_n0LgHe_hMzc/exec';

function saveLayout(){
  try{
    const wrap=document.getElementById('posters-wrap');
    if(!wrap||!wrap.innerHTML.trim()){alert('尚未載入海報，請先上傳 PDF。');return;}
    localStorage.setItem('posterLayoutSimple',JSON.stringify({html:wrap.innerHTML,zoom:_pswScale*100}));
    const st=document.getElementById('pstat');const prev=st.textContent;
    st.textContent='✓ 版面已儲存';st.style.color='#2c8a63';
    setTimeout(()=>{st.textContent=prev;st.style.color='';},1800);
  }catch(e){showErr('儲存失敗：'+(e&&e.message||e)+'（若為 file:// 開啟，瀏覽器可能停用儲存；改用 GitHub Pages 網址即可）');}
}
function restoreLayout(){
  const raw=localStorage.getItem('posterLayoutSimple');if(!raw)return false;
  try{const data=JSON.parse(raw);document.getElementById('posters-wrap').innerHTML=data.html;applyZoom(data.zoom||68);
    document.querySelectorAll('.sname').forEach(el=>el.textContent=_storeId);
    document.fonts.ready.then(()=>fixAndFitPosters());
    document.getElementById('pstat').textContent='✓ 已還原上次版面';document.getElementById('pstat').style.color='#2c8a63';return true;
  }catch(e){return false;}
}
function toggleR(){const p=document.getElementById('rpanel');p.style.display=p.style.display==='block'?'none':'block';document.getElementById('rok').style.display='none';}
async function sendR(){const type=document.querySelector('input[name="rt"]:checked').value;const msg=document.getElementById('rmsg').value.trim();const btn=document.getElementById('rsub');btn.disabled=true;btn.textContent='送出中…';try{await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({store:_storeId,tool:'海報-簡約大字版',type,message:msg,url:location.href})});}catch(e){}document.getElementById('rok').style.display='block';document.getElementById('rmsg').value='';btn.textContent='送出回報';btn.disabled=false;setTimeout(()=>{document.getElementById('rpanel').style.display='none';},2000);}
document.addEventListener('click',e=>{const p=document.getElementById('rpanel'),b=document.getElementById('rbtn');if(p.style.display==='block'&&!p.contains(e.target)&&e.target!==b)p.style.display='none';});

window.addEventListener('load',()=>{applyZoom(68);if(!restoreLayout())initPosters();document.querySelectorAll('.sname').forEach(el=>el.textContent=_storeId);});
