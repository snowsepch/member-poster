<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>右昌 會員優惠 海報系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--page-bg:#ffffff;--poster-bg:#f5f0e8;--navy:#1a2a5a;--accent:#f5e200;--cream:#f5f0e8;--text:#1a2a5a;--muted:#6a7080;--divider:#ddd6c4;--price-col:#1a2a5a;--orig-col:#b0a890;--badge-bg:#1a2a5a;--badge-fg:#ffffff;--badge-bar:#f5e200;--cat-bg:#f5e200;--cat-fg:#1a2a5a;--svc-bg:#eceae0;--svc-border:#ccc8b8;--date-bg:#1a2a5a;--date-fg:#f5e200;--ctrl:#0e0e0e;--ctrl2:#151515;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--page-bg);min-height:100vh;}
.cbar{background:var(--ctrl);padding:8px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid #050505;}
#b2,#b3{background:var(--ctrl2);}
.blabel{font-size:10px;color:#3a3a3a;white-space:nowrap;padding-right:9px;border-right:1px solid #1e1e1e;margin-right:2px;}
.tpill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:50px;border:1.5px solid #1e1e1e;background:transparent;cursor:pointer;font-size:11px;font-weight:700;font-family:'Noto Sans TC',sans-serif;color:#3a3a3a;transition:all .15s;white-space:nowrap;}
.tpill:hover{border-color:#383838;color:#aaa;}
.tpill.on{border-color:transparent;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.bhint{margin-left:auto;font-size:10px;color:#282828;white-space:nowrap;}
.pbadge{font-size:12px;font-weight:900;color:#ccc;white-space:nowrap;margin-right:4px;}
.pbadge em{color:#f5e200;font-style:normal;}
.bbtn{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:6px;border:1.5px solid #1e1e1e;background:#111;color:#555;font-size:11px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;}
.bbtn:hover{border-color:#383838;color:#bbb;}
.bbtn.pdf{background:#f5e200;border-color:#f5e200;color:#1a1040;font-weight:900;}
.bbtn.pdf:hover{background:#ffe400;}
.bbtn.prt{background:#1a2a5a;border-color:#2a3a70;color:#fff;}
.bbtn.prt:hover{background:#223272;}
.bstat{font-size:10px;color:#2a2a2a;}
#pfi{display:none;}
.pwrap{position:relative;}
.pop{display:none;position:absolute;top:calc(100% + 7px);left:0;background:#0e0e0e;border:1.5px solid #1e1e1e;border-radius:9px;padding:13px 15px;min-width:230px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.7);max-height:80vh;overflow-y:auto;}
.pop.on{display:block;}
.psec{font-size:9px;color:#2e2e2e;text-transform:uppercase;letter-spacing:.12em;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid #191919;}
.prow{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:#555;margin-bottom:7px;gap:6px;}
.prow:last-child{margin-bottom:0;}
.sv{color:#999;min-width:28px;text-align:right;font-size:10px;}
input[type=range]{-webkit-appearance:none;width:88px;height:3px;background:#1e1e1e;border-radius:2px;outline:none;flex-shrink:0;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:#eee;cursor:pointer;}
.fbtn{background:#1e1e1e;color:#888;border:1.5px solid #2a2a2a;border-radius:5px;padding:4px 9px;font-size:10px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s;}
.fbtn:hover{border-color:#555;color:#ccc;}
.fbtn.bold-on{background:#f5e200;color:#1a1040;border-color:#f5e200;}
#b3{font-size:10px;color:#2a2a2a;}
#b3 b{color:#f5e200;}
#b3 strong{color:#444;}

/* ══ 海報區 ══ */
#pa{display:flex;justify-content:center;padding:28px 16px 80px;}
#psw{transform-origin:top center;transition:transform .2s;}

/* 四張海報垂直排列 */
.poster-inner{width:794px;}
.poster{
  width:794px;
  background:var(--poster-bg);
  outline:1px solid rgba(0,0,0,.08);
  overflow:hidden;
  margin-bottom:40px;
}
.poster:last-child{margin-bottom:0;}

/* store bar */
.store-bar{background:var(--navy);border-bottom:3px solid var(--accent);padding:10px 28px;display:flex;justify-content:space-between;align-items:center;}
.sname{font-size:16px;font-weight:900;color:#fff;letter-spacing:.02em;outline:none;}
.ssep{color:#fff;opacity:.3;margin:0 10px;}
.ssub{font-size:11px;color:#fff;opacity:.5;letter-spacing:.04em;outline:none;}
.sbadge{border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:4px 12px;font-size:10px;font-weight:700;color:#fff;opacity:.6;}

/* header */
.ph{background:var(--cream);padding:22px 28px 18px;position:relative;overflow:hidden;min-height:180px;border-bottom:4px solid var(--navy);}
.ph-ghost{position:absolute;right:-8px;top:50%;transform:translateY(-50%);font-family:'Noto Sans TC',sans-serif;font-weight:900;font-size:128px;line-height:1;color:rgba(26,42,90,0.055);white-space:nowrap;pointer-events:none;user-select:none;letter-spacing:-.02em;}
.ph-toprow{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.date-pill{border:2px solid var(--navy);border-radius:4px;padding:5px 12px;font-size:13px;font-weight:700;color:var(--navy);font-family:'Bebas Neue',sans-serif;letter-spacing:.08em;}
.mem-pill{background:var(--accent);border-radius:4px;padding:5px 14px;font-size:12px;font-weight:900;color:var(--cat-fg);letter-spacing:.04em;}
.ph-eye{border:1px solid var(--navy);display:inline-block;padding:2px 8px;border-radius:2px;font-size:9px;font-weight:700;letter-spacing:.18em;color:var(--navy);opacity:.5;text-transform:uppercase;margin-bottom:6px;}
.ph-title{font-family:'Noto Sans TC',sans-serif;font-weight:900;font-size:80px;line-height:.9;color:var(--navy);letter-spacing:-.02em;outline:none;position:relative;z-index:1;}
.ph-sub{font-size:15px;font-weight:700;color:var(--navy);opacity:.7;margin-top:8px;letter-spacing:.04em;outline:none;position:relative;z-index:1;}

/* date bar */
.dbar{background:var(--date-bg);padding:9px 28px;text-align:center;}
.dtext{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.18em;color:var(--date-fg);outline:none;}

/* svc */
.svcbar{background:var(--svc-bg);display:grid;grid-template-columns:repeat(4,1fr);border-bottom:2px solid var(--svc-border);}
.svc{display:flex;align-items:center;gap:6px;padding:9px 12px;border-right:1px solid var(--svc-border);font-size:11px;font-weight:700;color:var(--text);outline:none;line-height:1.3;}
.svc:last-child{border-right:none;}

/* cat */
.catrow{background:var(--cat-bg);padding:6px 20px;font-size:12px;font-weight:900;color:var(--cat-fg);letter-spacing:.06em;}

/* product grid */
.pgrid{display:grid;grid-template-columns:1fr 1fr;border-bottom:1.5px solid var(--divider);background:var(--poster-bg);}
.pcol{padding:13px 18px 14px;border-right:1px solid var(--divider);}
.pcol:last-child{border-right:none;}
.phead{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px;}
.pname{font-family:'Noto Sans TC',sans-serif;font-size:15px;font-weight:900;color:var(--text);flex:1;}
.pstart{text-align:right;flex-shrink:0;display:flex;align-items:baseline;gap:2px;justify-content:flex-end;}
.psup{font-size:9px;color:var(--muted);line-height:1;}
.psp{font-family:'Bebas Neue',sans-serif;font-size:30px;line-height:1;color:var(--price-col);letter-spacing:.02em;}
.pbadge2{display:inline-flex;align-items:center;background:var(--badge-bg);border-radius:2px;padding:3px 8px 3px 4px;margin-bottom:8px;max-width:100%;}
.bbar{width:3px;height:11px;border-radius:1px;background:var(--badge-bar);margin-right:6px;flex-shrink:0;}
.btxt{font-weight:700;color:var(--badge-fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:10px;}
.srow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-top:1px solid var(--divider);}
.slbl{font-size:11px;color:var(--muted);}
.sright{display:flex;align-items:baseline;gap:7px;}
.sprice{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--price-col);letter-spacing:.02em;}
.sorig{font-size:10px;color:var(--orig-col);text-decoration:line-through;}
.empty-col{padding:13px 18px;color:var(--muted);font-size:11px;}
.no-items{padding:24px;text-align:center;color:var(--muted);font-size:12px;}

/* footer */
.pfoot{background:var(--navy);border-top:3px solid var(--accent);padding:12px 28px;display:flex;justify-content:space-between;align-items:center;}
.fnote{font-size:10px;color:#fff;opacity:.45;line-height:1.7;outline:none;}
.fbrand{text-align:right;}
.fstore{font-size:13px;font-weight:900;color:#fff;letter-spacing:.05em;outline:none;}
.freseller{font-size:9px;color:#fff;opacity:.3;letter-spacing:.1em;}

/* 回報 */
#cbar-sticky{position:sticky;top:0;z-index:90;}
#rbtn{position:fixed;bottom:18px;right:18px;z-index:9999;background:#0e0e0e;color:#555;border:1.5px solid #1e1e1e;border-radius:50px;padding:8px 14px;font-size:11px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;}
#rbtn:hover{background:#181818;color:#bbb;border-color:#383838;}
#rpanel{display:none;position:fixed;bottom:55px;right:18px;z-index:9999;background:#0e0e0e;border:1.5px solid #1e1e1e;border-radius:11px;padding:15px;width:232px;box-shadow:0 10px 32px rgba(0,0,0,.7);font-family:'Noto Sans TC',sans-serif;}
#rpanel h4{font-size:12px;font-weight:700;color:#ccc;margin-bottom:10px;}
.rtg{display:flex;flex-direction:column;gap:6px;margin-bottom:9px;}
.rtg label{font-size:11px;color:#666;display:flex;align-items:center;gap:7px;cursor:pointer;}
.rtg input[type=radio]{accent-color:#f5e200;}
#rmsg{width:100%;height:56px;background:#080808;border:1.5px solid #1e1e1e;border-radius:5px;padding:6px 8px;font-size:11px;font-family:'Noto Sans TC',sans-serif;color:#999;resize:none;box-sizing:border-box;margin-bottom:8px;outline:none;}
#rmsg:focus{border-color:#303030;}
#rsub{width:100%;background:#f5e200;color:#1a1040;border:none;border-radius:5px;padding:8px;font-size:11px;font-family:'Noto Sans TC',sans-serif;font-weight:900;cursor:pointer;}
#rsub:hover{background:#ffe400;}
#rsub:disabled{background:#1e1e1e;color:#333;cursor:not-allowed;}
#rok{display:none;text-align:center;padding:7px 0;font-size:11px;color:#3DAB8A;font-weight:700;}

/* 規格列新增/刪除按鈕 */
.row-del{display:inline-flex;flex-shrink:0;margin-left:6px;background:none;border:none;color:#c44;font-size:10px;cursor:pointer;padding:1px 4px;border-radius:3px;line-height:1;align-items:center;opacity:.5;}
.row-del:hover{opacity:1;}
.row-add{display:block;width:100%;background:none;border:1px dashed #ccc;border-radius:3px;color:#aaa;cursor:pointer;font-size:9px;font-family:'Noto Sans TC',sans-serif;padding:3px 8px;margin-top:3px;text-align:left;box-sizing:border-box;}
.row-add:hover{border-color:#888;color:#666;}

/* ══ 列印：每張海報分頁 ══ */
@media print{
  .row-del,.row-add{display:none!important;}
  @page{
    size: A4 portrait;
    margin: 0;
  }
  html{ -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .cbar, #cbar-sticky, #rbtn, #rpanel { display: none !important; }
  body { margin: 0; padding: 0; background: white; }
  #pa { padding: 0; margin: 0; display: block; }
  #psw { transform: none !important; margin: 0; }
  #posters-wrap { margin: 0; padding: 0; }
  .poster {
    display: block;
    position: relative;
    width: 210mm;
    height: 297mm;
    overflow: hidden;
    margin: 0;
    padding: 0;
    outline: none;
    break-before: page;
    page-break-before: always;
    break-inside: avoid;
    page-break-inside: avoid;
  }
  .poster:first-child {
    break-before: avoid;
    page-break-before: avoid;
  }
  .poster-inner {
    width: 794px;
  }
  [contenteditable] { outline: none !important; }
}
</style>
</head>
<body>

<!-- 控制列（sticky 固定頂部） -->
<div id="cbar-sticky">
<!-- Bar 1 主題 -->
<div class="cbar" id="b1">
  <span class="blabel">🎨 海報風格</span>
  <button class="tpill on" id="p-dp" onclick="setT('dp')"><span class="dot" style="background:#1a2a5a"></span><span class="dot" style="background:#f5e200"></span>深紫藍 × 亮黃</button>
  <button class="tpill" id="p-nb" onclick="setT('nb')"><span class="dot" style="background:#0d2444"></span><span class="dot" style="background:#c8dff0"></span>海軍藍 × 水藍</button>
  <button class="tpill" id="p-aw" onclick="setT('aw')"><span class="dot" style="background:#f5f5f7;border:1px solid #888"></span><span class="dot" style="background:#0066cc"></span>Apple 極簡白</button>
  <button class="tpill" id="p-rr" onclick="setT('rr')"><span class="dot" style="background:#1a1a1a;border:1px solid #555"></span><span class="dot" style="background:#FFC567"></span>深墨 × 暖黃</button>
  <span class="bhint">切換後直接列印，風格即時套用</span>
</div>

<!-- Bar 2 操作 -->
<div class="cbar" id="b2">
  <div class="pbadge">右昌 <em>會員優惠</em> 海報</div>
  <input type="file" id="pfi" accept=".pdf">
  <button class="bbtn pdf" onclick="document.getElementById('pfi').click()">📋 選擇操盤 PDF</button>

  <div class="pwrap">
    <button class="bbtn" onclick="tp('pop-f')">字體</button>
    <div class="pop" id="pop-f">
      <div class="psec">頁首</div>
      <div class="prow">店名 <span class="sv" id="vsn">16px</span><input type="range" min="10" max="24" value="16" oninput="sc('sname',this.value,'vsn')"></div>
      <div class="prow">主標題 <span class="sv" id="vt">80px</span><input type="range" min="40" max="120" value="80" oninput="sc('ph-title',this.value,'vt')"></div>
      <div class="prow">副標題 <span class="sv" id="vs">15px</span><input type="range" min="10" max="26" value="15" oninput="sc('ph-sub',this.value,'vs')"></div>
      <div class="psec" style="margin-top:8px;">日期 / 服務</div>
      <div class="prow">日期條 <span class="sv" id="vd">16px</span><input type="range" min="11" max="28" value="16" oninput="sc('dtext',this.value,'vd')"></div>
      <div class="prow">服務列 <span class="sv" id="vsv">11px</span><input type="range" min="8" max="16" value="11" oninput="sc('svc',this.value,'vsv')"></div>
      <div class="psec" style="margin-top:8px;">產品</div>
      <div class="prow">品類標題 <span class="sv" id="vcat">12px</span><input type="range" min="9" max="18" value="12" oninput="sc('catrow',this.value,'vcat')"></div>
      <div class="prow">品名 <span class="sv" id="vn">15px</span><input type="range" min="10" max="22" value="15" oninput="sc('pname',this.value,'vn')"></div>
      <div class="prow">優惠標籤 <span class="sv" id="vbt">10px</span><input type="range" min="7" max="14" value="10" oninput="sc('btxt',this.value,'vbt')"></div>
      <div class="prow">起始價 <span class="sv" id="vp">30px</span><input type="range" min="18" max="48" value="30" oninput="sc('psp',this.value,'vp')"></div>
      <div class="prow">規格標籤 <span class="sv" id="vsl">11px</span><input type="range" min="8" max="16" value="11" oninput="sc('slbl',this.value,'vsl')"></div>
      <div class="prow">規格價格 <span class="sv" id="vsp">18px</span><input type="range" min="12" max="32" value="18" oninput="sc('sprice',this.value,'vsp')"></div>
      <div class="prow">原價刪除線 <span class="sv" id="vso">10px</span><input type="range" min="7" max="14" value="10" oninput="sc('sorig',this.value,'vso')"></div>
      <div class="psec" style="margin-top:8px;">頁腳</div>
      <div class="prow">頁腳說明 <span class="sv" id="vfn">10px</span><input type="range" min="7" max="14" value="10" oninput="sc('fnote',this.value,'vfn')"></div>
      <div class="prow">頁腳店名 <span class="sv" id="vfs">13px</span><input type="range" min="10" max="20" value="13" oninput="sc('fstore',this.value,'vfs')"></div>
      <div class="psec" style="margin-top:8px;">粗體切換</div>
      <div class="prow" style="flex-wrap:wrap;gap:5px;">
        <button class="fbtn" onclick="toggleBoldCls('ph-title')">主標題</button>
        <button class="fbtn" onclick="toggleBoldCls('ph-sub')">副標題</button>
        <button class="fbtn" onclick="toggleBoldCls('pname')">品名</button>
        <button class="fbtn" onclick="toggleBoldCls('psp')">起始價</button>
        <button class="fbtn" onclick="toggleBoldCls('sprice')">規格價</button>
        <button class="fbtn" onclick="toggleBoldCls('slbl')">規格標籤</button>
        <button class="fbtn" onclick="toggleBoldCls('btxt')">優惠標籤</button>
        <button class="fbtn" onclick="toggleBoldCls('catrow')">品類標題</button>
        <button class="fbtn" onclick="toggleBoldCls('fnote')">頁腳說明</button>
        <button class="fbtn" onclick="toggleBoldCls('fstore')">頁腳店名</button>
      </div>
    </div>
  </div>

  <div class="pwrap">
    <button class="bbtn" onclick="tp('pop-sc')">縮放</button>
    <div class="pop" id="pop-sc">
      <div class="psec">整體比例</div>
      <div class="prow">比例 <span class="sv" id="vsc">85%</span><input type="range" min="50" max="120" value="85" oninput="setSc(this.value)"></div>
    </div>
  </div>

  <button class="bbtn prt" onclick="window.print()">🖨 列印</button>
  <button class="bbtn" id="sbtn" onclick="saveState()" style="background:#1e3a1e;border-color:#2a5a2a;color:#6dbf6d;">💾 儲存</button>
  <button class="bbtn" onclick="document.getElementById('dbgpanel').style.cssText='display:flex;flex-direction:column'" style="color:#333;font-size:10px;">🔍</button>
  <span class="bstat" id="pstat">請選擇操盤 PDF 檔案</span>
</div>

<!-- Bar 3 -->
<div class="cbar" id="b3">
  🖨 列印：Cmd+P → 紙張 <strong>A4</strong> → 縮放選 <b>「縮放至可列印區域」</b> → 勾 <b>「列印背景」</b> → 共 <b>4頁</b>
</div>
</div><!-- /cbar-sticky -->

<!-- Debug 面板 -->
<div id="dbgpanel" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:99999;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#111;border:1.5px solid #333;border-radius:10px;width:90%;max-width:800px;padding:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="color:#f5e200;font-size:13px;font-weight:700;">🔍 PDF 解析診斷</span>
      <button onclick="document.getElementById('dbgpanel').style.display='none'" style="background:#333;color:#fff;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:11px;">關閉</button>
    </div>
    <textarea id="dbgout" style="width:100%;height:60vh;background:#080808;color:#aaffaa;border:1px solid #333;border-radius:5px;padding:10px;font-size:11px;font-family:monospace;resize:none;" readonly></textarea>
  </div>
</div>

<!-- ══ 四張海報垂直排列 ══ -->
<div id="pa"><div id="psw">

  <div id="posters-wrap">
    <!-- 由 JS 產生 -->
  </div>

</div></div>

<button id="rbtn" onclick="toggleR()">📢 回報問題</button>
<div id="rpanel">
  <h4>回報問題</h4>
  <div class="rtg">
    <label><input type="radio" name="rt" value="功能異常" checked> 功能異常</label>
    <label><input type="radio" name="rt" value="資料錯誤"> 資料錯誤</label>
    <label><input type="radio" name="rt" value="顯示異常"> 顯示異常</label>
    <label><input type="radio" name="rt" value="其他"> 其他</label>
  </div>
  <textarea id="rmsg" placeholder="說明狀況（選填）"></textarea>
  <button id="rsub" onclick="sendR()">送出回報</button>

</div>

function fixName(name){
  return name
    .replace(/^([Pp]hone\s)/,'iPhone ')
    .replace(/^([Pp]ad\s)/,'iPad ')
    .replace(/^([Mm]ac\s)/,'iMac ')
    .replace(/Phone\s/g,'iPhone ')
    .replace(/Pad\s/g,'iPad ');
}

function getSpec(name){
  // Apple Watch：支援 "40mm" 與 "40 mm" 兩種格式
  const awM=name.match(/\b(40|42|44|46|49)(?:mm)?\b/);
  if(awM&&(name.includes('AW ')||name.includes('Apple Watch'))){
    const mm=awM[1]+'mm';
    if(name.includes('米蘭'))return mm+'/米蘭';
    if(name.includes('海洋'))return mm+'/海洋';
    return mm;
  }
  if(name.match(/AirPods|AirTag|Apple TV/i))return'';
  const macM=name.match(/(\d+G)\/([\d.]+[GT])/i);
  if(macM)return macM[1]+'/'+macM[2];
  const m=name.match(/(\d+(?:\.\d+)?)\s*([GT]B?)\b/i);
  if(!m)return'';
  const n=parseFloat(m[1]),u=m[2].toUpperCase();
  if(u==='T'||u==='TB')return n+'TB';
  if(n>=1000)return(n/1000)+'TB';
  return n+'G';
}
function getConn(name){if(/Wi-Fi\+LTE|LTE/i.test(name))return'LTE';if(/Wi-Fi/i.test(name))return'Wi-Fi';if(/GPS\+LTE/i.test(name))return'LTE';if(/GPS/i.test(name))return'GPS';return'';}

function parsePDF(text){
  const allLines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
  const tokens=text.split(/\s+/).filter(t=>t.length>0);
  const lines=[];let cur=[];
  for(const tok of tokens){if(/^\d{6}$/.test(tok)&&cur.length>0){lines.push(cur.join(' '));cur=[tok];}else cur.push(tok);}
  if(cur.length>0)lines.push(cur.join(' '));
  const rows=[];
  const re=/^(\d{6})\s+(.+?)\s+([A-Z][A-Z0-9]{5,}(?:\/[A-Z])?)\s+([\d,]+)(?:\s+([\d,]+)\s+([\d,]+))?/;
  for(const line of lines){
    const m=line.match(re);
    if(m){const mp=parseInt(m[4].replace(/,/g,'')),dc=m[5]?parseInt(m[5].replace(/,/g,'')):0,pp=m[6]?parseInt(m[6].replace(/,/g,'')):0;if(mp>500&&mp<200000)rows.push({name:fixName(m[2].trim()),memberPrice:mp,discount:dc,promoPrice:pp||mp});}
  }
  function cleanAct(al){
    const m=al.match(/[（(](.+?)[）)]/);
    if(m){const t=m[1].replace(/^(活動|注意)[：:]\s*/,'').trim();if(t.length>=2)return t.slice(0,60);}
    const kw=al.match(/(現折|滿萬|再送|附贈)[^\s，。；]{1,40}/);
    if(kw)return kw[0].trim().slice(0,50);
    return al.replace(/\s*(貨號|品名|型號|會員價|折讓額|促銷價).*/,'').trim().slice(0,60);
  }
  // 在單行中尋找最長匹配的 cat（含邊界檢查）
  function findCatInLine(line){
    let best=null,bestLen=0;
    for(const cat of CATS){
      const keys=[cat.k,cat.lbl];if(cat.actKey)keys.push(cat.actKey);
      for(const key of keys){
        if(key.length<=bestLen)continue;
        const idx=line.indexOf(key);if(idx<0)continue;
        if(/[^\x00-\x7F]/.test(key)){bestLen=key.length;best=cat;continue;}
        // 允許空格作為合法邊界（如 "Air 13 M5" → '13' 後接 ' M5'）
        const rest=line.slice(idx+key.length);
        if(!rest[0]||rest[0]===' '||!/[a-zA-Z\d]/.test(rest[0])){bestLen=key.length;best=cat;}
      }
    }
    return best;
  }
  // 逐行掃描：追蹤最近的產品 section，讓活動說明行可回溯對應
  const actMap={};
  let ctxCat=null;
  for(const line of allLines){
    if(/^\d{6}/.test(line))continue;
    const catInLine=findCatInLine(line);
    if(catInLine)ctxCat=catInLine; // 更新目前 section context
    const hasAct=/[（(]/.test(line)||/現折|滿萬|再送|附贈|贈品|注意/.test(line);
    if(hasAct&&line.length>4&&line.length<200){
      const target=catInLine||ctxCat; // 優先直接匹配，否則用 context
      if(target&&!actMap[target.lbl])actMap[target.lbl]=cleanAct(line);
    }
  }
  // Apple Watch：不以「錶帶」排除（SE3 名稱含「運動型錶帶」）
  const EXCL_WATCH=EXCLUDE.filter(k=>k!=='錶帶');
  // debug 輸出供診斷
  window._dbg={allLines:allLines.slice(0,200),actMap,rows:rows.slice(0,30)};
  const grouped={};
  for(const row of rows){
    if(row.name.startsWith('展-'))continue;
    if(row.promoPrice<3000&&row.memberPrice<3000)continue;
    let matched=null;
    for(const cat of CATS){if(row.name.includes(cat.k)||row.name.includes(cat.lbl)){matched=cat;break;}}
    if(!matched)continue;
    const excl=matched.grp==='Apple Watch'?EXCL_WATCH:EXCLUDE;
    if(excl.some(k=>row.name.includes(k)))continue;
    const lbl=matched.lbl;
    if(!grouped[lbl])grouped[lbl]={grp:matched.grp,lbl,specs:[],minPrice:Infinity,act:actMap[lbl]||''};
    const spec=getSpec(row.name),conn=getConn(row.name),price=row.promoPrice,orig=row.memberPrice;
    const noSpecOk=matched.grp==='耳機 & 其他'||matched.grp==='Apple Watch';
    if(!spec&&!noSpecOk)continue;
    const key=spec+(conn?'|'+conn:'');
    if(!grouped[lbl].specs.find(s=>s.key===key))grouped[lbl].specs.push({key,spec,conn,price,orig});
    if(price<grouped[lbl].minPrice)grouped[lbl].minPrice=price;
  }
  return grouped;
}

function fmt(n){if(!isFinite(n))return'—';return'$'+n.toLocaleString('zh-TW');}

function colHTML(item){
  const specs=item.specs.slice(0,4);
  const specsHTML=specs.map(s=>{
    const lbl=[s.spec,s.conn].filter(Boolean).join(' ');
    return`<div class="srow"><span class="slbl" contenteditable="true">${lbl}</span><div class="sright"><span class="sprice" contenteditable="true">${fmt(s.price)}</span>${s.orig>s.price?`<span class="sorig" contenteditable="true">原${fmt(s.orig)}</span>`:''}</div><button class="row-del" title="刪除此列" onclick="this.closest('.srow').remove()">✕</button></div>`;
  }).join('');
  const act=item.act?`<div class="pbadge2"><div class="bbar"></div><div class="btxt" contenteditable="true" style="font-size:10px;">${item.act}</div></div>`:'';
  return`<div class="pcol"><div class="phead"><div class="pname" contenteditable="true">${item.lbl}</div><div class="pstart"><span class="psp" contenteditable="true">${fmt(item.minPrice)}</span><span class="psup" contenteditable="true">起</span></div></div>${act}${specsHTML}<button class="row-add" onclick="addRow(this)">＋ 新增規格列</button></div>`;
}

function buildGroupHTML(grouped, groups){
  let html='';
  for(const g of groups){
    const items=Object.values(grouped).filter(i=>i.grp===g);
    if(!items.length)continue;
    html+=`<div class="catrow" contenteditable="true">${g}</div>`;
    for(let i=0;i<items.length;i+=2){
      const a=items[i],b=items[i+1];
      html+=`<div class="pgrid">${colHTML(a)}${b?colHTML(b):'<div class="empty-col"></div>'}</div>`;
    }
  }
  return html;
}

document.getElementById('pfi').addEventListener('change',async function(){
  const file=this.files[0];if(!file)return;
  const st=document.getElementById('pstat');
  st.textContent='解析中...';st.style.color='#f5e200';
  try{
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let fullText='';
    for(let p=1;p<=pdf.numPages;p++){
      const page=await pdf.getPage(p);
      const tc=await page.getTextContent();
      const items=tc.items;let lastY=null,line='';const lineArr=[];
      for(const item of items){const y=Math.round(item.transform[5]);if(lastY!==null&&Math.abs(y-lastY)>3){lineArr.push(line);line=item.str;}else{line+=(line?' ':'')+item.str;}lastY=y;}
      if(line)lineArr.push(line);
      fullText+=lineArr.join('\n')+'\n';
    }

    const fname=file.name.replace('.pdf','');
    const dm=fname.match(/(\d{4})-(\d{4})/);
    const dateStr=dm?(()=>{const f=d=>`${d.slice(0,2)}/${d.slice(2)}`;return`${f(dm[1])} — ${f(dm[2])}`;})():'05/19 — 05/31';

    const grouped=parsePDF(fullText);

    const wrap=document.getElementById('posters-wrap');
    wrap.innerHTML=POSTER_CFG.map(cfg=>{
      const productsHTML=buildGroupHTML(grouped,cfg.groups);
      return makePoster(cfg,dateStr,productsHTML);

  }catch(e){
    st.textContent='⚠️ 解析失敗：'+e.message;st.style.color='#f44';console.error(e);
  }

    localStorage.setItem('mps_v1',JSON.stringify({
      v:1,
      html:document.getElementById('posters-wrap').innerHTML,
      theme:cur,
      sliders
    }));
    const btn=document.getElementById('sbtn');
    if(btn){btn.textContent='✓ 已儲存';btn.style.color='#aaffaa';setTimeout(()=>{btn.textContent='💾 儲存';btn.style.color='#6dbf6d';},1500);}
  }catch(e){}
}

function loadState(){
  try{
    const raw=localStorage.getItem('mps_v1');
    if(!raw)return false;
    const s=JSON.parse(raw);
    if(!s||!s.v||!s.html)return false;
    document.getElementById('posters-wrap').innerHTML=s.html;
    if(s.theme)setT(s.theme);
    document.querySelectorAll('.pop input[type=range]').forEach(inp=>{
      const oi=inp.getAttribute('oninput')||'';
      const sv=inp.parentElement.querySelector('.sv');
      if(!sv||!s.sliders)return;
      const val=s.sliders[sv.id];if(val===undefined)return;
      inp.value=val;
      if(oi.includes('setSc')){setSc(val);}
      else{const m=oi.match(/sc\('([^']+)'/);if(m)sc(m[1],val,sv.id);}
    });
    applyStoredStyles();
    const st=document.getElementById('pstat');
    st.textContent='✓ 已載入儲存狀態';st.style.color='#3DAB8A';
    return true;
  }catch(e){return false;}
}

let _st;
function _as(){clearTimeout(_st);_st=setTimeout(saveState,800);}

/* ══ 回報 ══ */
const API='https://script.google.com/macros/s/AKfycbyiX43HQKr48-rd7DZSm5u9KP-uoeT6DagKrPYPs-G4lE5mnpf1yHUb_n0LgHe_hMzc/exec';
function toggleR(){const p=document.getElementById('rpanel');p.style.display=p.style.display==='block'?'none':'block';document.getElementById('rok').style.display='none';const b=document.getElementById('rsub');b.disabled=false;b.textContent='送出回報';}
async function sendR(){const type=document.querySelector('input[name="rt"]:checked').value;const msg=document.getElementById('rmsg').value.trim();const btn=document.getElementById('rsub');btn.disabled=true;btn.textContent='送出中...';try{await fetch(API,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({store:'右昌',tool:'門市海報系統',type,message:msg,url:location.href})});}catch(e){}document.getElementById('rok').style.display='block';document.getElementById('rmsg').value='';btn.textContent='送出回報';setTimeout(()=>{document.getElementById('rpanel').style.display='none';},2200);}
document.addEventListener('click',e=>{const p=document.getElementById('rpanel'),b=document.getElementById('rbtn');if(p.style.display==='block'&&!p.contains(e.target)&&e.target!==b)p.style.display='none';});

/* 列印前動態計算每張海報的 zoom */
function calcPrintZoom(){
  const a4W = 210 * 3.7795275591;
  const a4H = 297 * 3.7795275591;

  document.querySelectorAll('.poster-inner').forEach(inner=>{
    inner.style.zoom = '';
    void inner.offsetHeight; // force reflow before measuring
    const h = inner.scrollHeight;
    const zH = a4H / h;
    const zW = a4W / 794;
    const z = Math.min(zH, zW, 1) * 0.99; // 1% safety margin
    inner.style.zoom = String(z);
  });
}

if(window.matchMedia){
  const mq = window.matchMedia('print');
  mq.addListener(e=>{
    if(e.matches) calcPrintZoom();
  });
}
window.addEventListener('beforeprint', calcPrintZoom);
window.addEventListener('afterprint', ()=>{
  document.querySelectorAll('.poster-inner').forEach(el=>el.style.zoom='');
});

window.addEventListener('load',()=>{
  setT('dp');setSc(85);
  if(!loadState())initPosters();
  document.querySelectorAll('.sv').forEach(el=>{
    const input = el.parentElement.querySelector('input[type=range]');
    if(input) el.textContent = input.value + (el.id==='vsc'?'%':'px');
  });
  document.getElementById('posters-wrap').addEventListener('input',_as);
});
</script>
