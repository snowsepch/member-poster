<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>右昌 會員優惠 海報 A4列印版 v6</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --poster-bg:#F5F3EE;--navy:#1A1A1A;--accent:#F5A623;--cream:#F5F3EE;
  --text:#1A1A1A;--muted:#888;--divider:#ddd9d0;--price-col:#F06030;
  --orig-col:#aaa;--badge-bg:#1A1A1A;--badge-fg:#F5A623;--badge-bar:#F5A623;
  --cat-bg:transparent;--cat-fg:#888;--svc-bg:#ede9df;--svc-border:#d5d0c4;
  --date-bg:#1A1A1A;--date-fg:#F5A623;--ctrl:#f5f5f5;--ctrl2:#ebebeb;
  --card-bg:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:#d0d0d0;min-height:100vh;}

/* ── control bars ── */
.cbar{background:var(--ctrl);padding:7px 16px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;border-bottom:1px solid #d0d0d0;}
.blabel{font-size:10px;color:#666;white-space:nowrap;padding-right:8px;border-right:1px solid #ccc;margin-right:2px;}
.tpill{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:50px;border:1.5px solid #ccc;background:transparent;cursor:pointer;font-size:11px;font-weight:700;font-family:'Noto Sans TC',sans-serif;color:#555;transition:all .15s;white-space:nowrap;}
.tpill:hover{border-color:#888;color:#111;}
.tpill.on{border-color:transparent;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pbadge{font-size:12px;font-weight:900;color:#333;white-space:nowrap;margin-right:4px;}
.pbadge em{color:#1A1A1A;font-style:normal;}
.bbtn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:1.5px solid #ccc;background:#fff;color:#444;font-size:11px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;}
.bbtn:hover{border-color:#888;color:#111;}
.bbtn.pdf{background:#F5A623;border-color:#d9920a;color:#1A1A1A;font-weight:900;}
.bbtn.pdf:hover{background:#e09a10;}
.bbtn.prt{background:#1A1A1A;border-color:#333;color:#fff;}
.bbtn.prt:hover{background:#2a2a2a;}
.bstat{font-size:10px;color:#555;}
#pfi{display:none;}
.pwrap{position:relative;}
.pop{display:none;position:absolute;top:calc(100% + 7px);left:0;background:#fff;border:1.5px solid #d0d0d0;border-radius:9px;padding:13px 15px;min-width:230px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:80vh;overflow-y:auto;}
.pop.on{display:block;}
.psec{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.12em;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid #e0e0e0;}
.prow{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:#333;margin-bottom:7px;gap:6px;}
.prow:last-child{margin-bottom:0;}
.sv{color:#666;min-width:28px;text-align:right;font-size:10px;}
input[type=range]{-webkit-appearance:none;width:88px;height:3px;background:#d0d0d0;border-radius:2px;outline:none;flex-shrink:0;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:#1A1A1A;cursor:pointer;}
.fbtn{background:#f0f0f0;color:#555;border:1.5px solid #ccc;border-radius:5px;padding:4px 9px;font-size:10px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s;}
.fbtn:hover{border-color:#888;color:#111;}
.fbtn.bold-on{background:#F5A623;color:#1A1A1A;border-color:#d9920a;}
.scwrap{display:flex;align-items:center;gap:5px;margin-left:auto;}
.scwrap label{font-size:10px;color:#555;}

/* ── 海報顯示區 ── */
#pa{display:flex;justify-content:center;padding:24px 16px 60px;}
#psw{transform-origin:top center;transition:transform .2s;}

/* ── 海報包裝 ── */
.poster-wrap{display:flex;flex-direction:column;align-items:flex-start;margin-bottom:28px;}
.poster-wrap:last-child{margin-bottom:0;}

/* ── 手動縮放控制列 ── */
.poster-ctrl{width:794px;background:#e8e8e8;border:1px solid #ccc;border-bottom:none;border-radius:7px 7px 0 0;padding:7px 14px;display:flex;align-items:center;gap:10px;}
.pctrl-name{font-size:11px;font-weight:700;color:#1A1A1A;min-width:90px;}
.pctrl-sub{font-size:9px;color:#888;flex:1;}
.pctrl-range{-webkit-appearance:none;width:160px;height:3px;background:#bbb;border-radius:2px;outline:none;cursor:pointer;}
.pctrl-range::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#1A1A1A;cursor:pointer;}
.pctrl-val{font-size:11px;color:#1A1A1A;font-weight:700;min-width:40px;text-align:right;}

/* ── 海報本體：固定 794×1123px（≈ A4 @96dpi） ── */
.poster{
  width:794px;height:1123px;display:flex;flex-direction:column;
  background:var(--poster-bg);overflow:hidden;
  outline:1px solid rgba(0,0,0,.1);transform-origin:top left;position:relative;
}

/* store bar */
.store-bar{background:var(--navy);border-bottom:3px solid var(--accent);padding:9px 24px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.sname{font-size:15px;font-weight:900;color:#fff;letter-spacing:.02em;outline:none;}
.ssep{color:#fff;opacity:.3;margin:0 8px;}
.ssub{font-size:10px;color:#fff;opacity:.5;letter-spacing:.04em;outline:none;}
.sbadge{border:1px solid rgba(255,255,255,.25);border-radius:4px;padding:3px 10px;font-size:9px;font-weight:700;color:#fff;opacity:.6;}

/* header — 新版型 */
.ph{background:var(--cream);padding:16px 24px 14px;position:relative;overflow:hidden;border-bottom:3px solid var(--navy);flex-shrink:0;}
.ph-toprow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ph-tag{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}
.date-pill{background:var(--accent);border-radius:4px;padding:4px 13px;font-size:14px;font-weight:900;color:var(--navy);font-family:'Bebas Neue',sans-serif;letter-spacing:.1em;outline:none;}
.ph-title{font-family:'Noto Sans TC',sans-serif;font-weight:900;font-size:62px;line-height:.95;color:var(--text);letter-spacing:-.02em;outline:none;}
.ph-sub{font-size:10px;font-weight:700;color:var(--muted);margin-top:6px;letter-spacing:.1em;text-transform:uppercase;outline:none;}

/* date/activity bar */
.dbar{background:var(--accent);padding:6px 24px;flex-shrink:0;}
.dtext{font-size:11px;font-weight:900;color:var(--navy);letter-spacing:.02em;outline:none;}

/* svc */
.svcbar{background:var(--svc-bg);display:grid;grid-template-columns:repeat(4,1fr);border-bottom:2px solid var(--svc-border);flex-shrink:0;}
.svc{display:flex;align-items:center;gap:4px;padding:6px 8px;border-right:1px solid var(--svc-border);font-size:9.5px;font-weight:700;color:var(--text);outline:none;line-height:1.2;white-space:nowrap;overflow:hidden;}
.svc:last-child{border-right:none;}

/* products */
.poster-products{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;}

/* cat label — 細分隔線風格 */
.catrow{padding:10px 18px 4px;font-size:9px;font-weight:700;color:var(--cat-fg);letter-spacing:.14em;text-transform:uppercase;border-bottom:1px solid var(--divider);flex-shrink:0;outline:none;background:transparent;}

/* product grid — 卡片風格 */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 14px 10px;background:var(--poster-bg);border-bottom:1px solid var(--divider);}
.pcol{background:var(--card-bg);border:1px solid var(--divider);border-radius:6px;padding:10px 12px 8px;}
.phead{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:3px;}
.pname-wrap{flex:1;min-width:0;}
.pname{font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:900;color:var(--text);}
.psub{font-size:9px;color:var(--muted);margin-top:2px;line-height:1.3;}

/* % OFF 顯示 */
.pdisc{display:flex;align-items:flex-end;gap:1px;flex-shrink:0;}
.pdisc-num{font-family:'Bebas Neue',sans-serif;font-size:44px;line-height:1;color:var(--price-col);}
.pdisc-unit{display:flex;flex-direction:column;align-items:flex-start;padding-bottom:4px;}
.pdisc-pct{font-size:13px;font-weight:900;color:var(--price-col);line-height:1.1;}
.pdisc-off{font-size:10px;font-weight:900;color:var(--price-col);line-height:1.1;letter-spacing:.04em;}

/* 無折扣時顯示價格 */
.pstart{text-align:right;flex-shrink:0;display:flex;align-items:baseline;gap:2px;}
.psup{font-size:8px;color:var(--muted);line-height:1;}
.psp{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;color:var(--price-col);}

.pbadge2{display:inline-flex;align-items:center;background:var(--badge-bg);border-radius:2px;padding:2px 6px 2px 3px;margin-top:3px;max-width:100%;}
.bbar{width:3px;height:9px;border-radius:1px;background:var(--badge-bar);margin-right:4px;flex-shrink:0;}
.btxt{font-weight:700;color:var(--badge-fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:9px;}
.srow{display:flex;justify-content:space-between;align-items:center;padding:2px 0;border-top:1px solid var(--divider);}
.slbl{font-size:9.5px;color:var(--muted);}
.sright{display:flex;align-items:baseline;gap:5px;}
.sprice{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--text);}
.sorig{font-size:9px;color:var(--orig-col);text-decoration:line-through;}
.empty-col{padding:9px 14px;color:var(--muted);font-size:10px;background:var(--card-bg);border:1px solid var(--divider);border-radius:6px;}
.no-items{padding:20px;text-align:center;color:var(--muted);font-size:11px;}

/* footer */
.pfoot{background:var(--navy);border-top:3px solid var(--accent);padding:9px 24px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.fnote{font-size:9px;color:#fff;opacity:.45;line-height:1.6;outline:none;}
.fbrand{text-align:right;}
.fstore{font-size:12px;font-weight:900;color:#fff;letter-spacing:.05em;outline:none;}
.freseller{font-size:8px;color:#fff;opacity:.3;letter-spacing:.1em;}

/* edit helpers */
.row-del{display:inline-flex;flex-shrink:0;margin-left:4px;background:none;border:none;color:#c44;font-size:9px;cursor:pointer;padding:1px 3px;border-radius:3px;opacity:.5;}
.row-del:hover{opacity:1;}
.row-add{display:block;width:100%;background:none;border:1px dashed #ccc;border-radius:3px;color:#aaa;cursor:pointer;font-size:8px;font-family:'Noto Sans TC',sans-serif;padding:2px 6px;margin-top:3px;text-align:left;}
.row-add:hover{border-color:#888;color:#666;}

/* ════════════════════════════════════════════════════
   PRINT — 完全隔離方案
   ════════════════════════════════════════════════════ */
@media screen{#print-only{display:none;}}
@media print{
  @page{size:A4 portrait;margin:0;}
  html{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  body{margin:0;padding:0;background:white;}
  body>*:not(#print-only){display:none!important;}
  #print-only{display:block!important;}
  .ppage{
    width:210mm;height:297mm;overflow:hidden;position:relative;display:block;
    page-break-after:always;break-after:page;
  }
  .ppage:last-child{page-break-after:auto;break-after:auto;}
  [contenteditable]{outline:none!important;}
}
</style>
</head>
<body>

<!-- Bar 1：主題 -->
<div class="cbar" id="b1">
  <span class="blabel">🎨 風格</span>
  <button class="tpill on" id="p-dp" onclick="setT('dp')"><span class="dot" style="background:#1A1A1A"></span><span class="dot" style="background:#F5A623"></span>炭黑×橘</button>
  <button class="tpill" id="p-nb" onclick="setT('nb')"><span class="dot" style="background:#1F3A5F"></span><span class="dot" style="background:#F5A623"></span>海軍藍×橘</button>
  <button class="tpill" id="p-aw" onclick="setT('aw')"><span class="dot" style="background:#1d1d1f"></span><span class="dot" style="background:#F06030"></span>深灰×珊瑚橘</button>
  <button class="tpill" id="p-rr" onclick="setT('rr')"><span class="dot" style="background:#9C2A2A"></span><span class="dot" style="background:#F5A623"></span>磚紅×橘</button>
</div>

<!-- Bar 2：操作 -->
<div class="cbar" id="b2">
  <div class="pbadge">右昌 <em>會員優惠</em> 海報</div>
  <input type="file" id="pfi" accept=".pdf">
  <button class="bbtn pdf" onclick="document.getElementById('pfi').click()">📋 選擇操盤 PDF</button>
  <div class="pwrap">
    <button class="bbtn" onclick="tp('pop-f')">字體</button>
    <div class="pop" id="pop-f">
      <div class="psec">頁首</div>
      <div class="prow">店名 <span class="sv" id="vsn">15px</span><input type="range" min="10" max="24" value="15" oninput="sc('sname',this.value,'vsn')"></div>
      <div class="prow">主標題 <span class="sv" id="vt">62px</span><input type="range" min="32" max="100" value="62" oninput="sc('ph-title',this.value,'vt')"></div>
      <div class="prow">副標題 <span class="sv" id="vs">10px</span><input type="range" min="7" max="18" value="10" oninput="sc('ph-sub',this.value,'vs')"></div>
      <div class="psec" style="margin-top:8px;">日期 / 服務</div>
      <div class="prow">活動條 <span class="sv" id="vd">11px</span><input type="range" min="9" max="20" value="11" oninput="sc('dtext',this.value,'vd')"></div>
      <div class="prow">服務列 <span class="sv" id="vsv">9.5px</span><input type="range" min="7" max="15" value="9" oninput="sc('svc',this.value,'vsv')"></div>
      <div class="psec" style="margin-top:8px;">產品</div>
      <div class="prow">品類標題 <span class="sv" id="vcat">9px</span><input type="range" min="7" max="14" value="9" oninput="sc('catrow',this.value,'vcat')"></div>
      <div class="prow">品名 <span class="sv" id="vn">13px</span><input type="range" min="9" max="20" value="13" oninput="sc('pname',this.value,'vn')"></div>
      <div class="prow">優惠標籤 <span class="sv" id="vbt">9px</span><input type="range" min="7" max="13" value="9" oninput="sc('btxt',this.value,'vbt')"></div>
      <div class="prow">折扣數字 <span class="sv" id="vdnum">44px</span><input type="range" min="24" max="72" value="44" oninput="sc('pdisc-num',this.value,'vdnum')"></div>
      <div class="prow">規格標籤 <span class="sv" id="vsl">9.5px</span><input type="range" min="7" max="15" value="9" oninput="sc('slbl',this.value,'vsl')"></div>
      <div class="prow">規格價格 <span class="sv" id="vsp">14px</span><input type="range" min="10" max="24" value="14" oninput="sc('sprice',this.value,'vsp')"></div>
      <div class="prow">原價刪除線 <span class="sv" id="vso">9px</span><input type="range" min="7" max="13" value="9" oninput="sc('sorig',this.value,'vso')"></div>
      <div class="psec" style="margin-top:8px;">頁腳</div>
      <div class="prow">頁腳說明 <span class="sv" id="vfn">9px</span><input type="range" min="7" max="13" value="9" oninput="sc('fnote',this.value,'vfn')"></div>
      <div class="prow">頁腳店名 <span class="sv" id="vfs">12px</span><input type="range" min="9" max="18" value="12" oninput="sc('fstore',this.value,'vfs')"></div>
      <div class="psec" style="margin-top:8px;">粗體切換</div>
      <div class="prow" style="flex-wrap:wrap;gap:5px;">
        <button class="fbtn" onclick="toggleBoldCls('ph-title')">主標題</button>
        <button class="fbtn" onclick="toggleBoldCls('ph-sub')">副標題</button>
        <button class="fbtn" onclick="toggleBoldCls('pname')">品名</button>
        <button class="fbtn" onclick="toggleBoldCls('sprice')">規格價</button>
        <button class="fbtn" onclick="toggleBoldCls('slbl')">規格標籤</button>
        <button class="fbtn" onclick="toggleBoldCls('btxt')">優惠標籤</button>
        <button class="fbtn" onclick="toggleBoldCls('catrow')">品類標題</button>
        <button class="fbtn" onclick="toggleBoldCls('fnote')">頁腳說明</button>
        <button class="fbtn" onclick="toggleBoldCls('fstore')">頁腳店名</button>
      </div>
    </div>
  </div>
  <button class="bbtn prt" onclick="doPrint()">🖨 列印 / 匯出 PDF</button>
  <button class="bbtn" onclick="fixAndFitPosters()" style="background:#f0f4ff;border-color:#1A1A1A;color:#1A1A1A;">✦ 自動縮放</button>
  <span class="bstat" id="pstat">請先上傳操盤 PDF</span>
  <div class="scwrap">
    <label>畫面</label>
    <input type="range" id="scslider" min="40" max="110" value="75" oninput="setSc(this.value)">
    <span id="vsc">75%</span>
  </div>
</div>

<!-- Bar 3：列印說明 -->
<div class="cbar" id="b3" style="gap:8px;font-size:10px;">
  🖨 <b style="color:#1A1A1A">列印步驟：</b>
  <span style="color:#555">點「列印」→ 縮放</span><b style="color:#111">100%</b>
  <span style="color:#555">→ 勾</span><b style="color:#111">「列印背景」</b>
  <span style="color:#555">→</span><b style="color:#d04020">取消勾選「列印標頭和頁尾」</b>
  <span style="color:#555">→ 輸出</span><b style="color:#1A1A1A">4頁</b>
</div>

<!-- 海報區 -->
<div id="pa"><div id="psw">
  <div id="posters-wrap"></div>
</div></div>

<button id="rbtn" onclick="toggleR()" style="position:fixed;bottom:16px;right:16px;z-index:9999;background:#0e0e0e;color:#555;border:1.5px solid #1e1e1e;border-radius:50px;padding:7px 13px;font-size:11px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;">📢 回報</button>
<div id="rpanel" style="display:none;position:fixed;bottom:50px;right:16px;z-index:9999;background:#0e0e0e;border:1.5px solid #1e1e1e;border-radius:10px;padding:14px;width:220px;font-family:'Noto Sans TC',sans-serif;">
  <h4 style="font-size:12px;font-weight:700;color:#ccc;margin-bottom:9px;">回報問題</h4>
  <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:8px;">
    <label style="font-size:11px;color:#666;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="rt" value="功能異常" checked> 功能異常</label>
    <label style="font-size:11px;color:#666;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="rt" value="資料錯誤"> 資料錯誤</label>
    <label style="font-size:11px;color:#666;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="rt" value="顯示異常"> 顯示異常</label>
    <label style="font-size:11px;color:#666;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="rt" value="其他"> 其他</label>
  </div>
  <textarea id="rmsg" placeholder="說明狀況（選填）" style="width:100%;height:52px;background:#080808;border:1.5px solid #1e1e1e;border-radius:5px;padding:6px 8px;font-size:11px;font-family:'Noto Sans TC',sans-serif;color:#999;resize:none;box-sizing:border-box;margin-bottom:7px;outline:none;"></textarea>
  <button id="rsub" onclick="sendR()" style="width:100%;background:#F5A623;color:#1A1A1A;border:none;border-radius:5px;padding:7px;font-size:11px;font-family:'Noto Sans TC',sans-serif;font-weight:900;cursor:pointer;">送出回報</button>
  <div id="rok" style="display:none;text-align:center;padding:6px 0;font-size:11px;color:#3DAB8A;font-weight:700;">✅ 已送出，謝謝！</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function setT(k){
  const t=THEMES[k],r=document.documentElement;
  Object.entries(t).forEach(([key,val])=>{if(key.startsWith('--'))r.style.setProperty(key,val);});
  document.querySelectorAll('.tpill').forEach(p=>{p.classList.remove('on');p.style.background='';p.style.color='';});
  const pill=document.getElementById('p-'+k);
  if(pill){pill.classList.add('on');pill.style.background=t.pill;pill.style.color=t.pt;}
  ['b1','b2','b3'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.background=id==='b1'?t['--ctrl']:t['--ctrl2'];});
}

const boldState={};
function toggleBoldCls(cls){
  boldState[cls]=!boldState[cls];const isBold=boldState[cls];
  document.querySelectorAll('.'+cls).forEach(el=>el.style.setProperty('font-weight',isBold?'900':'400','important'));
  document.querySelectorAll('.fbtn').forEach(b=>{if(b.getAttribute('onclick')===`toggleBoldCls('${cls}')`)b.classList.toggle('bold-on',isBold);});
}
function applyStoredStyles(){
  Object.entries(boldState).forEach(([cls,isBold])=>{document.querySelectorAll('.'+cls).forEach(el=>el.style.setProperty('font-weight',isBold?'900':'400','important'));});
  document.querySelectorAll('.sv').forEach(el=>{
    const input=el.parentElement.querySelector('input[type=range]');
    if(!input||!el.id)return;
    const m=input.getAttribute('oninput').match(/sc\('([^']+)'/);
    if(m)document.querySelectorAll('.'+m[1]).forEach(e=>e.style.setProperty('font-size',input.value+'px','important'));
  });
}

/* ── 手動縮放滑桿 ── */
const posterScales={iphone:100,mac:100,ipad:100,watch:100};
function setPosterZoom(id,pct){
  posterScales[id]=Number(pct);
  const poster=document.getElementById('poster-'+id);
  if(!poster)return;
  poster.style.zoom=pct<100?String(pct/100):'';
  const lbl=document.getElementById('pctrl-val-'+id);if(lbl)lbl.textContent=pct+'%';
  const slider=document.getElementById('pctrl-'+id);if(slider)slider.value=pct;
}

/* ── fixAndFitPosters ── */
function fixAndFitPosters(){
  let anyZoomed=false;
  POSTER_CFG.forEach(cfg=>{
    const poster=document.getElementById('poster-'+cfg.id);
    if(!poster)return;
    const products=poster.querySelector('.poster-products');
    if(products){products.style.flex='';products.style.height='';products.style.maxHeight='';products.style.overflow='';}
    poster.style.zoom='';
    void poster.offsetHeight;
    let fixedH=0;
    poster.querySelectorAll('.store-bar,.ph,.dbar,.svcbar,.pfoot').forEach(el=>{fixedH+=el.offsetHeight;});
    const TARGET=1123;
    const availH=Math.max(60,TARGET-fixedH-6);
    if(products){
      products.style.flex='none';
      products.style.height=availH+'px';
      products.style.maxHeight=availH+'px';
      products.style.overflow='hidden';
      products.style.minHeight='0';
      products.style.display='flex';
      products.style.flexDirection='column';
    }
    void poster.offsetHeight;
    const totalH=poster.offsetHeight;
    if(totalH>TARGET+2){
      const pct=Math.max(50,Math.min(100,Math.floor(TARGET/totalH*100)));
      setPosterZoom(cfg.id,pct);anyZoomed=true;
    }else{
      setPosterZoom(cfg.id,100);
    }
  });
  const st=document.getElementById('pstat');
  if(st&&st.textContent.indexOf('｜')<0)
    st.textContent+=' ｜ '+(anyZoomed?'已縮放符合A4':'版面已鎖定至A4');
}

/* ── doPrint ── */
function doPrint(){
  fixAndFitPosters();
  void document.body.offsetHeight;
  let ponly=document.getElementById('print-only');
  if(!ponly){ponly=document.createElement('div');ponly.id='print-only';document.body.appendChild(ponly);}
  ponly.innerHTML='';
  POSTER_CFG.forEach(cfg=>{
    const poster=document.getElementById('poster-'+cfg.id);
    if(!poster)return;
    const page=document.createElement('div');
    page.className='ppage';
    let top=0;
    [...poster.children].forEach(orig=>{
      const h=orig.offsetHeight;
      if(h===0)return;
      const cl=orig.cloneNode(true);
      cl.querySelectorAll('.row-del,.row-add').forEach(e=>e.remove());
      cl.querySelectorAll('[contenteditable]').forEach(e=>e.removeAttribute('contenteditable'));
      cl.style.setProperty('position','absolute','important');
      cl.style.setProperty('top',top+'px','important');
      cl.style.setProperty('left','0','important');
      cl.style.setProperty('width','794px','important');
      cl.style.setProperty('height',h+'px','important');
      cl.style.setProperty('overflow','hidden','important');
      cl.style.setProperty('flex','none','important');
      page.appendChild(cl);
      top+=h;
    });
    ponly.appendChild(page);
  });
  void document.body.offsetHeight;
  window.print();
}
window.addEventListener('afterprint',()=>{
  const p=document.getElementById('print-only');
  if(p)p.innerHTML='';
  applyZoom(_pswScale*100);
});
let _pswScale=0.75;
function applyZoom(v){_pswScale=v/100;setSc(v);}

const EXCLUDE=['保護殼','保護貼','保護套','錶帶','鍵盤','雙面夾','Pencil','Trackpad','Mouse','Keyboard','掛繩','卡套','筆尖','編織線','USB','HomePod','展-','高山錶環','越野錶環'];
function fixName(n){return n.replace(/^([Pp]hone\s)/,'iPhone ').replace(/^([Pp]ad\s)/,'iPad ').replace(/^([Mm]ac\s)/,'iMac ').replace(/Phone\s/g,'iPhone ').replace(/Pad\s/g,'iPad ');}
function getSpec(name){
  const awM=name.match(/\b(40|42|44|46|49)(?:mm)?\b/);
  if(awM&&(name.includes('AW ')||name.includes('Apple Watch'))){
    const mm=awM[1]+'mm';
    if(name.includes('米蘭'))return mm+'/米蘭';
    if(name.includes('海洋'))return mm+'/海洋';
    return mm;
  }
  if(name.match(/AirPods|AirTag/i))return'';
  const macM=name.match(/(\d+G)\/([\d.]+[GT])/i);if(macM)return macM[1]+'/'+macM[2];
  const m=name.match(/(\d+(?:\.\d+)?)\s*([GT]B?)\b/i);if(!m)return'';
  const n=parseFloat(m[1]),u=m[2].toUpperCase();
  if(u==='T'||u==='TB')return n+'TB';if(n>=1000)return(n/1000)+'TB';return n+'G';
}
function getConn(name){
  if(/Wi-Fi\+LTE|LTE/i.test(name))return'LTE';
  if(/Wi-Fi/i.test(name))return'Wi-Fi';
  if(/GPS\+LTE/i.test(name))return'LTE';
  if(/GPS/i.test(name))return'GPS';
  return'';
}
function parsePDF(text){
  const allLines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
  const tokens=text.split(/\s+/).filter(t=>t.length>0);
  const lines=[];let c=[];
  for(const tok of tokens){if(/^\d{6}$/.test(tok)&&c.length>0){lines.push(c.join(' '));c=[tok];}else c.push(tok);}
  if(c.length>0)lines.push(c.join(' '));
  const rows=[];
  const re=/^(\d{6})\s+(.+?)\s+([A-Z][A-Z0-9]{5,}(?:\/[A-Z])?)\s+([\d,]+)(?:\s+([\d,]+)\s+([\d,]+))?/;
  for(const line of lines){const m=line.match(re);if(m){const mp=parseInt(m[4].replace(/,/g,'')),pp=m[6]?parseInt(m[6].replace(/,/g,'')):0;if(mp>500&&mp<200000)rows.push({name:fixName(m[2].trim()),memberPrice:mp,promoPrice:pp||mp});}}
  function cleanAct(al){const m=al.match(/[（(](.+?)[）)]/);if(m){const t=m[1].replace(/^(活動|注意)[：:]\s*/,'').trim();if(t.length>=2)return t.slice(0,60);}const kw=al.match(/(現折|滿萬|再送|附贈)[^\s，。；]{1,40}/);if(kw)return kw[0].trim().slice(0,50);return al.replace(/\s*(貨號|品名|型號|會員價|折讓額|促銷價).*/,'').trim().slice(0,60);}
  function findCat(line){let best=null,bestLen=0;for(const cat of CATS){const keys=[cat.k,cat.lbl];if(cat.actKey)keys.push(cat.actKey);for(const key of keys){if(key.length<=bestLen)continue;const idx=line.indexOf(key);if(idx<0)continue;if(/[^\x00-\x7F]/.test(key)){bestLen=key.length;best=cat;continue;}const rest=line.slice(idx+key.length);if(!rest[0]||rest[0]===' '||!/[a-zA-Z\d]/.test(rest[0])){bestLen=key.length;best=cat;}}}return best;}
  const actMap={};let ctxCat=null;
  for(const line of allLines){if(/^\d{6}/.test(line))continue;const catInLine=findCat(line);if(catInLine)ctxCat=catInLine;const hasAct=/[（(]/.test(line)||/現折|滿萬|再送|附贈|贈品|注意/.test(line);if(hasAct&&line.length>4&&line.length<200){const target=catInLine||ctxCat;if(target&&!actMap[target.lbl])actMap[target.lbl]=cleanAct(line);}}
  const EXCL_WATCH=EXCLUDE.filter(k=>k!=='錶帶');
  const grouped={};
  for(const row of rows){
    if(row.name.startsWith('展-'))continue;
    if(row.promoPrice<3000&&row.memberPrice<3000)continue;
    let matched=null;
    for(const cat of CATS){if(row.name.includes(cat.k)||row.name.includes(cat.lbl)){matched=cat;break;}}
    if(!matched)continue;
    const excl=matched.grp==='Apple Watch'?EXCL_WATCH:EXCLUDE;
    if(excl.some(k=>row.name.includes(k)))continue;
    const conn=getConn(row.name);
    /* iPad：只保留 Wi-Fi */
    if(matched.grp==='iPad'&&(conn==='LTE'||/[Cc]ellular/.test(row.name)))continue;
    /* Apple Watch SE / S11：只保留 GPS（非 LTE） */
    if((matched.k==='AW SE'||matched.k==='AW S11')&&conn==='LTE')continue;
    /* Apple Watch Ultra：只保留米蘭 / 海洋錶帶 */
    if(matched.k==='AW Ultra'){const s=getSpec(row.name);if(!s.includes('米蘭')&&!s.includes('海洋'))continue;}
    const lbl=matched.lbl;
    if(!grouped[lbl])grouped[lbl]={grp:matched.grp,lbl,specs:[],minPrice:Infinity,minOrig:Infinity,act:actMap[lbl]||''};
    const spec=getSpec(row.name),price=row.promoPrice,orig=row.memberPrice;
    const noSpecOk=matched.grp==='耳機 & 其他'||matched.grp==='Apple Watch';
    if(!spec&&!noSpecOk)continue;
    const key=spec+(conn?'|'+conn:'');
    if(!grouped[lbl].specs.find(s=>s.key===key))grouped[lbl].specs.push({key,spec,conn,price,orig});
    if(price<grouped[lbl].minPrice){grouped[lbl].minPrice=price;grouped[lbl].minOrig=orig;}
  }
  return grouped;
}
function fmt(n){return isFinite(n)?'$'+n.toLocaleString('zh-TW'):'—';}
function colHTML(item){
  /* 折扣 % */
  const pct=item.minOrig>item.minPrice?Math.round((1-item.minPrice/item.minOrig)*100):0;
  const discHTML=pct>0
    ?`<div class="pdisc"><span class="pdisc-num" contenteditable="true">${pct}</span><div class="pdisc-unit"><span class="pdisc-pct">%</span><span class="pdisc-off">OFF</span></div></div>`
    :`<div class="pstart"><span class="psp" contenteditable="true">${fmt(item.minPrice)}</span><span class="psup">起</span></div>`;
  /* 規格副標（同類型時省略 conn） */
  const conns=[...new Set(item.specs.map(s=>s.conn).filter(Boolean))];
  const subLabels=item.specs.slice(0,6).map(s=>{const parts=[s.spec,conns.length>1?s.conn:null].filter(Boolean);return parts.join(' ');}).filter(Boolean);
  const subHTML=subLabels.length?`<div class="psub" contenteditable="true">${subLabels.join(' / ')}</div>`:'';
  const act=item.act?`<div class="pbadge2"><div class="bbar"></div><div class="btxt" contenteditable="true">${item.act}</div></div>`:'';
  /* 規格明細列 */
  const specsHTML=item.specs.slice(0,4).map(s=>{
    const lbl=[s.spec,s.conn].filter(Boolean).join(' ');
    if(!lbl)return'';
    return`<div class="srow"><span class="slbl" contenteditable="true">${lbl}</span><div class="sright"><span class="sprice" contenteditable="true">${fmt(s.price)}</span>${s.orig>s.price?`<span class="sorig" contenteditable="true">原${fmt(s.orig)}</span>`:''}</div><button class="row-del" onclick="this.closest('.srow').remove()">✕</button></div>`;
  }).filter(Boolean).join('');
  return`<div class="pcol"><div class="phead"><div class="pname-wrap"><div class="pname" contenteditable="true">${item.lbl}</div>${subHTML}${act}</div>${discHTML}</div>${specsHTML}<button class="row-add" onclick="addRow(this)">＋ 新增規格列</button></div>`;
}
function buildGroupHTML(grouped,groups){
  let html='';
  for(const g of groups){
    const items=Object.values(grouped).filter(i=>i.grp===g);
    if(!items.length)continue;
    html+=`<div class="catrow" contenteditable="true">${g}</div>`;
    for(let i=0;i<items.length;i+=2){
      const a=items[i],b=items[i+1];
      html+=`<div class="pgrid">${colHTML(a)}${b?colHTML(b):'<div class="empty-col"></div>'}</div>`;
    }
  }
  return html;
}

document.getElementById('pfi').addEventListener('change',async function(){
  const file=this.files[0];if(!file)return;
  const st=document.getElementById('pstat');st.textContent='解析中...';st.style.color='#F5A623';
  try{
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let fullText='';
    for(let p=1;p<=pdf.numPages;p++){
      const pg=await pdf.getPage(p);
      const tc=await pg.getTextContent();
      const items=tc.items;
      /* 改良 Y 座標分行：同一行容忍 ±2px 浮動，解決字元被切分問題 */
      const lineMap=new Map();
      for(const item of items){
        const y=Math.round(item.transform[5]);
        let found=null;
        for(const [ky] of lineMap){if(Math.abs(ky-y)<=2){found=ky;break;}}
        const key=found!==null?found:y;
        if(!lineMap.has(key))lineMap.set(key,[]);
        lineMap.get(key).push({x:Math.round(item.transform[4]),str:item.str});
      }
      const sorted=[...lineMap.entries()].sort((a,b)=>b[0]-a[0]);
      for(const [,parts] of sorted){
        parts.sort((a,b)=>a.x-b.x);
        fullText+=parts.map(p=>p.str).join(' ')+'\n';
      }
    }
    const fname=file.name.replace('.pdf','');
    const dm=fname.match(/(\d{4})-(\d{4})/);
    const dateStr=dm?(()=>{const f=d=>`${d.slice(0,2)}/${d.slice(2)}`;return`${f(dm[1])} — ${f(dm[2])}`;})():'05/19 — 05/31';
    const grouped=parsePDF(fullText);
    document.getElementById('posters-wrap').innerHTML=POSTER_CFG.map(cfg=>makePoster(cfg,dateStr,buildGroupHTML(grouped,cfg.groups))).join('');
    applyStoredStyles();
    POSTER_CFG.forEach(cfg=>{posterScales[cfg.id]=100;const s=document.getElementById('pctrl-'+cfg.id);if(s)s.value=100;const v=document.getElementById('pctrl-val-'+cfg.id);if(v)v.textContent='100%';});
    document.querySelectorAll('.fstore,.sname').forEach(el=>el.textContent=_storeId);
    st.textContent='✓ '+file.name;st.style.color='#3DAB8A';
    document.fonts.ready.then(()=>fixAndFitPosters());
  }catch(e){st.textContent='⚠️ 解析失敗：'+e.message;st.style.color='#f44';console.error(e);}
});
