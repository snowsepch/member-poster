<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>右昌 會員優惠 海報 A4列印版 v8</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --poster-bg:#F5F3EE;--navy:#1A1A1A;--accent:#F5A623;
  --text:#1A1A1A;--muted:#888;--divider:#ddd9d0;
  --orig-col:#aaa;--ctrl:#f5f5f5;--ctrl2:#ebebeb;--card-bg:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:#d0d0d0;min-height:100vh;}

.cbar{background:var(--ctrl);padding:7px 16px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;border-bottom:1px solid #d0d0d0;}
.blabel{font-size:10px;color:#666;white-space:nowrap;padding-right:8px;border-right:1px solid #ccc;margin-right:2px;}
.tpill{display:flex;align-items:center;gap:5px;padding:4px 11px;border-radius:50px;border:1.5px solid #ccc;background:transparent;cursor:pointer;font-size:11px;font-weight:700;font-family:'Noto Sans TC',sans-serif;color:#555;transition:all .15s;white-space:nowrap;}
.tpill:hover{border-color:#888;color:#111;}
.tpill.on{border-color:transparent;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pbadge{font-size:12px;font-weight:900;color:#333;white-space:nowrap;margin-right:4px;}
.pbadge em{font-style:normal;color:#1A1A1A;}
.bbtn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:1.5px solid #ccc;background:#fff;color:#444;font-size:11px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;}
.bbtn:hover{border-color:#888;color:#111;}
.bbtn.pdf{background:#e0e0e0;border-color:#bbb;color:#1A1A1A;font-weight:900;}
.bbtn.pdf:hover{background:#ccc;}
.bbtn.prt{background:#1A1A1A;border-color:#333;color:#fff;}
.bbtn.prt:hover{background:#2a2a2a;}
.bstat{font-size:10px;color:#555;}
#pfi{display:none;}
.pwrap{position:relative;}
.pop{display:none;position:absolute;top:calc(100% + 7px);left:0;background:#fff;border:1.5px solid #d0d0d0;border-radius:9px;padding:13px 15px;min-width:230px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:80vh;overflow-y:auto;}
.pop.on{display:block;}
.psec{font-size:9px;color:#888;text-transform:uppercase;letter-spacing:.12em;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid #e0e0e0;}
.prow{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:#333;margin-bottom:7px;gap:6px;}
.prow:last-child{margin-bottom:0;}
.sv{color:#666;min-width:28px;text-align:right;font-size:10px;}
input[type=range]{-webkit-appearance:none;width:88px;height:3px;background:#d0d0d0;border-radius:2px;outline:none;flex-shrink:0;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:#1A1A1A;cursor:pointer;}
.fbtn{background:#f0f0f0;color:#555;border:1.5px solid #ccc;border-radius:5px;padding:4px 9px;font-size:10px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s;}
.fbtn:hover{border-color:#888;color:#111;}
.fbtn.bold-on{background:#1A1A1A;color:#fff;border-color:#333;}
.scwrap{display:flex;align-items:center;gap:5px;margin-left:auto;}
.scwrap label{font-size:10px;color:#555;}

#pa{display:flex;justify-content:center;padding:24px 16px 60px;}
#psw{transform-origin:top center;transition:transform .2s;}
.poster-wrap{display:flex;flex-direction:column;align-items:flex-start;margin-bottom:28px;}
.poster-wrap:last-child{margin-bottom:0;}
.poster-ctrl{width:794px;background:#e8e8e8;border:1px solid #ccc;border-bottom:none;border-radius:7px 7px 0 0;padding:7px 14px;display:flex;align-items:center;gap:10px;}
.pctrl-name{font-size:11px;font-weight:700;color:#1A1A1A;min-width:90px;}
.pctrl-sub{font-size:9px;color:#888;flex:1;}
.pctrl-range{-webkit-appearance:none;width:160px;height:3px;background:#bbb;border-radius:2px;outline:none;cursor:pointer;}
.pctrl-range::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#1A1A1A;cursor:pointer;}
.pctrl-val{font-size:11px;color:#1A1A1A;font-weight:700;min-width:40px;text-align:right;}

.poster{width:794px;height:1123px;display:flex;flex-direction:column;background:var(--poster-bg);overflow:hidden;outline:1px solid rgba(0,0,0,.1);transform-origin:top left;position:relative;}

/* store bar */
.store-bar{background:var(--navy);border-bottom:1px solid rgba(255,255,255,.12);padding:14px 30px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.sname{font-size:21px;font-weight:900;color:#fff;letter-spacing:.02em;outline:none;}
.ssep{color:#fff;opacity:.3;margin:0 11px;}
.ssub{font-size:11px;color:#fff;opacity:.5;letter-spacing:.04em;outline:none;}
.sdate{font-size:17px;font-weight:900;color:#F5A623;letter-spacing:.04em;outline:none;font-family:'Noto Sans TC',sans-serif;}

/* series bar */
.series-bar{display:none;}

/* svc */
.svcbar{background:var(--navy);display:grid;grid-template-columns:repeat(4,1fr);flex-shrink:0;border-top:1px solid rgba(255,255,255,.08);}
.svc{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px 8px;border-right:1px solid rgba(255,255,255,.1);font-size:16px;font-weight:700;color:#fff;outline:none;line-height:1.2;white-space:nowrap;overflow:hidden;}
.svc:last-child{border-right:none;}

/* products — 自動字級：--fs 由 fixAndFitPosters 計算，使每頁填滿可用高度 */
.poster-products{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;--fs:1;}

/* catrow */
.catrow{padding:calc(10px*var(--fs)) 18px calc(5px*var(--fs));font-size:calc(10px*var(--fs));font-weight:700;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;border-bottom:1px solid var(--divider);flex-shrink:0;outline:none;margin-top:calc(4px*var(--fs));}
.catrow:first-child{margin-top:0;}

/* product card */
.pcol{margin:calc(8px*var(--fs)) 16px 0;border:1px solid var(--divider);border-radius:6px;overflow:hidden;flex-shrink:0;}
.pcol:first-child{margin-top:calc(10px*var(--fs));}
.pcol:last-child{margin-bottom:calc(8px*var(--fs));}
.pcol-head{background:var(--navy);padding:calc(11px*var(--fs)) 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.pname{font-size:calc(18px*var(--fs));font-weight:900;color:#fff;outline:none;flex-shrink:0;}
.pact{font-size:calc(13px*var(--fs));font-weight:700;color:rgba(255,255,255,.82);text-align:right;outline:none;flex:1;min-width:0;}
.pcol-body{background:var(--card-bg);padding:calc(12px*var(--fs)) 16px calc(10px*var(--fs));}
.pspecs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:calc(10px*var(--fs)) 16px;margin-bottom:calc(8px*var(--fs));}
.pspec-item{position:relative;}
.pspec-label{font-size:calc(12px*var(--fs));color:var(--muted);margin-bottom:calc(3px*var(--fs));outline:none;}
.pspec-price{font-family:'Noto Sans TC',sans-serif;font-size:calc(24px*var(--fs));font-weight:900;color:var(--text);outline:none;line-height:1.1;}
.pspec-orig{font-size:calc(10px*var(--fs));color:var(--orig-col);text-decoration:line-through;outline:none;}
.pcolor{display:none;}
.spec-del{position:absolute;top:0;right:0;background:none;border:none;color:#c44;font-size:9px;cursor:pointer;padding:1px 3px;border-radius:3px;opacity:.4;}
.spec-del:hover{opacity:1;}
.spec-add{display:block;width:100%;background:none;border:1px dashed #ccc;border-radius:3px;color:#aaa;cursor:pointer;font-size:8px;font-family:'Noto Sans TC',sans-serif;padding:3px 8px;margin-top:6px;text-align:left;}
.spec-add:hover{border-color:#888;color:#666;}

/* iPad mini + iPad 11 同一行 */
.pgrid-pair{display:grid;grid-template-columns:1fr 1fr;gap:0 8px;margin:calc(8px*var(--fs)) 16px 0;}
.pgrid-pair .pcol{margin:0;}
.pgrid-pair .pcol:first-child{margin-top:0;}
.pgrid-pair .pcol:last-child{margin-bottom:0;}

/* footer */
.pfoot{background:var(--navy);border-top:1px solid rgba(255,255,255,.12);padding:13px 30px;display:flex;justify-content:center;align-items:center;flex-shrink:0;}
.fnote{font-size:15.5px;color:#fff;opacity:.62;line-height:1.5;outline:none;text-align:center;}

@media screen{#print-only{display:none;}}
@media print{
  @page{size:A4 portrait;margin:0;}
  html{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  body{margin:0;padding:0;background:white;}
  body>*:not(#print-only){display:none!important;}
  #print-only{display:block!important;}
  .ppage{width:210mm;height:297mm;overflow:hidden;position:relative;display:block;page-break-after:always;break-after:page;background:#fff;}
  .ppage:last-child{page-break-after:auto;break-after:auto;}
  /* 海報以固定比例置中縮放到安全可列印區，避免印表機驅動再縮放造成跑版/裁切 */
  .psheet{position:absolute;top:50%;left:50%;width:794px;height:1123px;transform:translate(-50%,-50%) scale(var(--print-scale,0.95));transform-origin:center center;}
  [contenteditable]{outline:none!important;}
}
</style>
</head>
<body>

<div class="cbar" id="b1">
  <span class="blabel">🎨 風格</span>
  <button class="tpill on" id="p-dp" onclick="setT('dp')"><span class="dot" style="background:#1A1A1A"></span>炭黑</button>
  <button class="tpill" id="p-nb" onclick="setT('nb')"><span class="dot" style="background:#1F3A5F"></span>海軍藍</button>
</div>

<div class="cbar" id="b2">
  <div class="pbadge">右昌 <em>會員優惠</em> 海報</div>
  <input type="file" id="pfi" accept=".pdf">
  <button class="bbtn pdf" onclick="document.getElementById('pfi').click()">📋 選擇操盤 PDF</button>
  <div class="pwrap">
    <button class="bbtn" onclick="tp('pop-f')">字體</button>
    <div class="pop" id="pop-f">
      <div class="psec">頁首</div>
      <div class="prow">店名 <span class="sv" id="vsn">21px</span><input type="range" min="12" max="30" value="21" oninput="sc('sname',this.value,'vsn')"></div>
      <div class="prow">日期 <span class="sv" id="vsd">17px</span><input type="range" min="10" max="26" value="17" oninput="sc('sdate',this.value,'vsd')"></div>
      <div class="psec" style="margin-top:8px;">服務列</div>
      <div class="prow">服務文字 <span class="sv" id="vsv">16px</span><input type="range" min="8" max="22" value="16" step="0.5" oninput="sc('svc',this.value,'vsv')"></div>
      <div class="psec" style="margin-top:8px;">產品卡</div>
      <div class="prow">品名 <span class="sv" id="vn">18px</span><input type="range" min="10" max="28" value="18" oninput="sc('pname',this.value,'vn')"></div>
      <div class="prow">活動文字 <span class="sv" id="vat">13px</span><input type="range" min="8" max="20" value="13" step="0.5" oninput="sc('pact',this.value,'vat')"></div>
      <div class="prow">規格標籤 <span class="sv" id="vsl">12px</span><input type="range" min="8" max="18" value="12" oninput="sc('pspec-label',this.value,'vsl')"></div>
      <div class="prow">規格價格 <span class="sv" id="vsp">24px</span><input type="range" min="14" max="36" value="24" oninput="sc('pspec-price',this.value,'vsp')"></div>
      <div class="psec" style="margin-top:8px;">頁腳</div>
      <div class="prow">頁腳說明 <span class="sv" id="vfn">15.5px</span><input type="range" min="8" max="20" value="15.5" step="0.5" oninput="sc('fnote',this.value,'vfn')"></div>
      <div class="psec" style="margin-top:8px;">粗體切換</div>
      <div class="prow" style="flex-wrap:wrap;gap:5px;">
        <button class="fbtn" onclick="toggleBoldCls('pname')">品名</button>
        <button class="fbtn" onclick="toggleBoldCls('pact')">活動文字</button>
        <button class="fbtn" onclick="toggleBoldCls('pspec-price')">規格價</button>
        <button class="fbtn" onclick="toggleBoldCls('pspec-label')">規格標籤</button>
        <button class="fbtn" onclick="toggleBoldCls('fnote')">頁腳說明</button>
        <button class="fbtn" onclick="toggleBoldCls('fstore')">頁腳店名</button>
      </div>
    </div>
  </div>
  <button class="bbtn prt" onclick="doPrint()">🖨 列印 / 匯出 PDF</button>
  <button class="bbtn" onclick="saveLayout()" style="background:#f5f5f5;border-color:#888;color:#1A1A1A;">💾 儲存版面</button>
  <button class="bbtn" onclick="fixAndFitPosters()" style="background:#f0f4ff;border-color:#1A1A1A;color:#1A1A1A;">✦ 自動縮放</button>
  <span class="bstat" id="pstat">請先上傳操盤 PDF</span>
  <div class="scwrap">
    <label>畫面</label>
    <input type="range" id="scslider" min="40" max="110" value="75" oninput="applyZoom(this.value)">
    <span id="vsc">75%</span>
  </div>
</div>

<div class="cbar" id="b3" style="gap:8px;font-size:10px;">
  🖨 <b style="color:#1A1A1A">列印步驟：</b>
  <span style="color:#555">點「列印」→ 縮放</span><b style="color:#111">100%（勿用「符合頁面」）</b>
  <span style="color:#555">→ 勾</span><b style="color:#111">「列印背景」</b>
  <span style="color:#555">→</span><b style="color:#d04020">取消「列印標頭和頁尾」</b>
  <span style="color:#555">→ 共</span><b style="color:#1A1A1A">5頁</b>
  <span style="color:#999">（已內建安全邊界，不會被裁切）</span>
</div>

<div id="pa"><div id="psw"><div id="posters-wrap"></div></div></div>

<button id="rbtn" onclick="toggleR()" style="position:fixed;bottom:16px;right:16px;z-index:9999;background:#0e0e0e;color:#555;border:1.5px solid #1e1e1e;border-radius:50px;padding:7px 13px;font-size:11px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;">📢 回報</button>
<div id="rpanel" style="display:none;position:fixed;bottom:50px;right:16px;z-index:9999;background:#0e0e0e;border:1.5px solid #1e1e1e;border-radius:10px;padding:14px;width:220px;font-family:'Noto Sans TC',sans-serif;">
  <h4 style="font-size:12px;font-weight:700;color:#ccc;margin-bottom:9px;">回報問題</h4>
  <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:8px;">
    <label style="font-size:11px;color:#666;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="rt" value="功能異常" checked> 功能異常</label>
    <label style="font-size:11px;color:#666;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="rt" value="資料錯誤"> 資料錯誤</label>
    <label style="font-size:11px;color:#666;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="rt" value="顯示異常"> 顯示異常</label>
    <label style="font-size:11px;color:#666;display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="rt" value="其他"> 其他</label>
  </div>
  <textarea id="rmsg" placeholder="說明狀況（選填）" style="width:100%;height:52px;background:#080808;border:1.5px solid #1e1e1e;border-radius:5px;padding:6px 8px;font-size:11px;font-family:'Noto Sans TC',sans-serif;color:#999;resize:none;box-sizing:border-box;margin-bottom:7px;outline:none;"></textarea>
  <button id="rsub" onclick="sendR()" style="width:100%;background:#1A1A1A;color:#fff;border:none;border-radius:5px;padding:7px;font-size:11px;font-family:'Noto Sans TC',sans-serif;font-weight:900;cursor:pointer;">送出回報</button>
  <div id="rok" style="display:none;text-align:center;padding:6px 0;font-size:11px;color:#3DAB8A;font-weight:700;">✅ 已送出，謝謝！</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const THEMES={
  dp:{'--poster-bg':'#F5F3EE','--navy':'#1A1A1A','--accent':'#F5A623','--text':'#1A1A1A','--muted':'#888','--divider':'#ddd9d0','--orig-col':'#aaa','--card-bg':'#ffffff','--ctrl':'#f5f5f5','--ctrl2':'#ebebeb',pill:'#1A1A1A',pt:'#fff'},
  nb:{'--poster-bg':'#F5F3EE','--navy':'#1F3A5F','--accent':'#F5A623','--text':'#1F3A5F','--muted':'#7a8090','--divider':'#ddd9d0','--orig-col':'#aaa','--card-bg':'#ffffff','--ctrl':'#f5f5f5','--ctrl2':'#ebebeb',pill:'#1F3A5F',pt:'#fff'}
};
function setT(k){
  const t=THEMES[k],r=document.documentElement;
  Object.entries(t).forEach(([key,val])=>{if(key.startsWith('--'))r.style.setProperty(key,val);});
  document.querySelectorAll('.tpill').forEach(p=>{p.classList.remove('on');p.style.background='';p.style.color='';});
  const pill=document.getElementById('p-'+k);
  if(pill){pill.classList.add('on');pill.style.background=t.pill;pill.style.color=t.pt;}
  ['b1','b2','b3'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.background=id==='b1'?t['--ctrl']:t['--ctrl2'];});
}
let _pswScale=0.75;
function applyZoom(v){_pswScale=v/100;document.getElementById('psw').style.transform=`scale(${v/100})`;document.getElementById('vsc').textContent=v+'%';}
function sc(cls,v,vid){
  document.querySelectorAll('.'+cls).forEach(el=>el.style.setProperty('font-size',v+'px','important'));
  const vl=document.getElementById(vid);if(vl)vl.textContent=v+'px';
}
function tp(id){
  document.querySelectorAll('.pop').forEach(p=>{if(p.id!==id)p.classList.remove('on');});
  document.getElementById(id).classList.toggle('on');
}
document.addEventListener('click',e=>{if(!e.target.closest('.pwrap'))document.querySelectorAll('.pop').forEach(p=>p.classList.remove('on'));});
const boldState={};
function toggleBoldCls(cls){
  boldState[cls]=!boldState[cls];const isBold=boldState[cls];
  document.querySelectorAll('.'+cls).forEach(el=>el.style.setProperty('font-weight',isBold?'900':'400','important'));
  document.querySelectorAll('.fbtn').forEach(b=>{if(b.getAttribute('onclick')===`toggleBoldCls('${cls}')`)b.classList.toggle('bold-on',isBold);});
}
function applyStoredStyles(){
  Object.entries(boldState).forEach(([cls,isBold])=>{document.querySelectorAll('.'+cls).forEach(el=>el.style.setProperty('font-weight',isBold?'900':'400','important'));});
}
const posterScales={iphone:100,mac:100,ipad:100,watch:100,accessories:100};
function setPosterZoom(id,pct){
  posterScales[id]=Number(pct);
  const poster=document.getElementById('poster-'+id);
  if(!poster)return;
  poster.style.zoom=pct<100?String(pct/100):'';
  const lbl=document.getElementById('pctrl-val-'+id);if(lbl)lbl.textContent=pct+'%';
  const slider=document.getElementById('pctrl-'+id);if(slider)slider.value=pct;
}
function fixAndFitPosters(){
  /* 每頁自動計算產品區字級 --fs，使內容剛好填滿可用高度：
     稀疏頁放大（上限 1.5x，老花友善）、密集頁縮小（下限 0.62x），垂直置中，避免大片留白 */
  const TARGET=1123, FS_MIN=0.62, FS_MAX=1.5;
  POSTER_CFG.forEach(cfg=>{
    const poster=document.getElementById('poster-'+cfg.id);
    if(!poster)return;
    poster.style.zoom='';
    setPosterZoom(cfg.id,100);
    const products=poster.querySelector('.poster-products');
    if(!products)return;
    /* 還原為自然高度以便量測 */
    products.style.flex='none';products.style.height='auto';products.style.maxHeight='none';
    products.style.overflow='visible';products.style.display='flex';products.style.flexDirection='column';
    products.style.justifyContent='flex-start';products.style.minHeight='0';
    products.style.setProperty('--fs','1');
    void poster.offsetHeight;
    /* 可用高度 = A4 − 固定區（頁首/服務列/頁尾） */
    let fixedH=0;
    poster.querySelectorAll('.store-bar,.svcbar,.pfoot').forEach(el=>{fixedH+=el.offsetHeight;});
    const availH=Math.max(80,TARGET-fixedH-2);
    const hasCards=!!poster.querySelector('.pcol');
    let fs=1;
    if(hasCards){
      for(let i=0;i<7;i++){
        products.style.setProperty('--fs',fs.toFixed(3));
        void products.offsetHeight;
        const contentH=products.offsetHeight;
        if(contentH<=0)break;
        const ratio=availH/contentH;
        if(ratio>0.99&&ratio<1.01)break;
        fs=Math.max(FS_MIN,Math.min(FS_MAX,fs*ratio));
      }
      products.style.setProperty('--fs',fs.toFixed(3));
    }
    /* 量測最終自然高度，決定是否垂直置中（內容比可用高度短時置中，消除頂部大留白） */
    void products.offsetHeight;
    const finalH=products.offsetHeight;
    /* 鎖定產品區為可用高度 */
    products.style.height=availH+'px';products.style.maxHeight=availH+'px';products.style.overflow='hidden';
    products.style.justifyContent=(finalH<availH-4)?'center':'flex-start';
  });
  const st=document.getElementById('pstat');
  if(st&&st.textContent.indexOf('｜')<0)st.textContent+=' ｜ 已自動配置字級填滿 A4';
}

/* ── PDF 解析 ── */
const CATS=[
  {k:'iPhone 17 Pro Max',lbl:'iPhone 17 Pro Max',grp:'iPhone'},
  {k:'iPhone 17 Pro',lbl:'iPhone 17 Pro',grp:'iPhone'},
  {k:'iPhone 17e',lbl:'iPhone 17e',grp:'iPhone'},
  {k:'iPhone 17',lbl:'iPhone 17',grp:'iPhone'},
  {k:'13吋MBN',lbl:'MacBook Neo 13"',grp:'Mac',actKey:'MacBook Neo'},
  {k:'13.6吋MBA',lbl:'MacBook Air 13"',grp:'Mac',actKey:'MacBook Air 13'},
  {k:'15.3吋MBA',lbl:'MacBook Air 15"',grp:'Mac',actKey:'MacBook Air 15'},
  {k:'14.2吋MBP',lbl:'MacBook Pro 14"',grp:'Mac',actKey:'MacBook Pro 14'},
  {k:'16.2吋MBP',lbl:'MacBook Pro 16"',grp:'Mac',actKey:'MacBook Pro 16'},
  {k:'iPad mini',lbl:'iPad mini',grp:'iPad'},
  {k:'iPad Air 11吋(M4)',lbl:'iPad Air 11"',grp:'iPad'},
  {k:'iPad Air 11吋 M4',lbl:'iPad Air 11"',grp:'iPad'},
  {k:'iPad Air 13',lbl:'iPad Air 13"',grp:'iPad'},
  {k:'iPad Pro 11',lbl:'iPad Pro 11"',grp:'iPad'},
  {k:'iPad Pro 13',lbl:'iPad Pro 13"',grp:'iPad'},
  {k:'iPad 11',lbl:'iPad 11"',grp:'iPad'},
  {k:'AW Ultra',lbl:'Apple Watch Ultra 3',grp:'Apple Watch'},
  {k:'AW S11',lbl:'Apple Watch S11',grp:'Apple Watch'},
  {k:'AW SE',lbl:'Apple Watch SE',grp:'Apple Watch'},
  {k:'AirPods Pro 3',lbl:'AirPods Pro 3',grp:'耳機 & 其他'},
  {k:'AirPods Pro',lbl:'AirPods Pro',grp:'耳機 & 其他'},
  {k:'AirPods 4-主動',lbl:'AirPods 4 ANC',grp:'耳機 & 其他'},
  {k:'AirPods 4',lbl:'AirPods 4',grp:'耳機 & 其他'},
  {k:'AirTag 2-4',lbl:'AirTag 2（4入）',grp:'耳機 & 其他'},
  {k:'AirTag 2-1',lbl:'AirTag 2（1入）',grp:'耳機 & 其他'},
];
const EXCLUDE=['保護殼','保護貼','保護套','錶帶','鍵盤','雙面夾','Pencil','Trackpad','Mouse','Keyboard','掛繩','卡套','筆尖','編織線','USB','HomePod','展-','高山錶環','越野錶環'];
/* 修正抽取時偶爾掉開頭 i（限名稱開頭，不動 Mac mini/Studio/Book） */
function fixName(n){return n.replace(/^Phone\s/,'iPhone ').replace(/^Pad\s/,'iPad ').replace(/^Mac\s+(\d+吋)/,'iMac $1').trim();}
function getSpec(name){
  const awM=name.match(/\b(40|42|44|46|49)(?:mm)?\b/);
  if(awM&&(name.includes('AW ')||name.includes('Apple Watch'))){const mm=awM[1]+'mm';if(name.includes('米蘭'))return mm+'/米蘭';if(name.includes('海洋'))return mm+'/海洋';return mm;}
  if(name.match(/AirPods|AirTag/i))return'';
  const macM=name.match(/(\d+G)\/([\d.]+[GT])/i);if(macM)return macM[1]+'/'+macM[2];
  const m=name.match(/(\d+(?:\.\d+)?)\s*([GT]B?)\b/i);if(!m)return'';
  const nv=parseFloat(m[1]),u=m[2].toUpperCase();
  if(u==='T'||u==='TB')return nv+'TB';if(nv>=1000)return(nv/1000)+'TB';return nv+'G';
}
function getConn(name){
  if(/Wi-Fi\+LTE|LTE/i.test(name))return'LTE';if(/Wi-Fi/i.test(name))return'Wi-Fi';
  if(/GPS\+LTE/i.test(name))return'LTE';if(/GPS/i.test(name))return'GPS';return'';
}
function parsePDF(text){
  const allLines=text.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
  const tokens=text.split(/\s+/).filter(t=>t.length>0);
  const lines=[];let c=[];
  for(const tok of tokens){if(/^\d{6}$/.test(tok)&&c.length>0){lines.push(c.join(' '));c=[tok];}else c.push(tok);}
  if(c.length>0)lines.push(c.join(' '));
  const rows=[];
  const re=/^(\d{6})\s+(.+?)\s+([A-Z][A-Z0-9]{5,}(?:\/[A-Z])?)\s+([\d,]+)(?:\s+([\d,]+)\s+([\d,]+))?/;
  for(const line of lines){const m=line.match(re);if(m){const mp=parseInt(m[4].replace(/,/g,'')),pp=m[6]?parseInt(m[6].replace(/,/g,'')):0;if(mp>500&&mp<200000)rows.push({name:fixName(m[2].trim()),memberPrice:mp,promoPrice:pp||mp});}}
  function cleanAct(al){const m=al.match(/[（(](.+?)[）)]/);if(m){const t=m[1].replace(/^(活動|注意)[：:]\s*/,'').trim();if(t.length>=2)return t.slice(0,60);}const kw=al.match(/(現折|滿萬|再送|附贈)[^\s，。；]{1,40}/);if(kw)return kw[0].trim().slice(0,50);return al.replace(/\s*(貨號|品名|型號|會員價|折讓額|促銷價).*/,'').trim().slice(0,60);}
  function findCat(line){let best=null,bestLen=0;for(const cat of CATS){const keys=[cat.k,cat.lbl];if(cat.actKey)keys.push(cat.actKey);for(const key of keys){if(key.length<=bestLen)continue;const idx=line.indexOf(key);if(idx<0)continue;if(/[^\x00-\x7F]/.test(key)){bestLen=key.length;best=cat;continue;}const rest=line.slice(idx+key.length);if(!rest[0]||rest[0]===' '||!/[a-zA-Z\d]/.test(rest[0])){bestLen=key.length;best=cat;}}}return best;}
  const actMap={};let ctxCat=null;
  for(const line of allLines){if(/^\d{6}/.test(line))continue;const catInLine=findCat(line);if(catInLine)ctxCat=catInLine;const hasAct=/[（(]/.test(line)||/現折|滿萬|再送|附贈|贈品|注意/.test(line);if(hasAct&&line.length>4&&line.length<200){const target=catInLine||ctxCat;if(target&&!actMap[target.lbl])actMap[target.lbl]=cleanAct(line);}}
  const EXCL_WATCH=EXCLUDE.filter(k=>k!=='錶帶');
  const grouped={};
  for(const row of rows){
    if(row.name.startsWith('展-'))continue;
    let matched=null;for(const cat of CATS){if(row.name.includes(cat.k)||row.name.includes(cat.lbl)){matched=cat;break;}}
    if(!matched)continue;
    /* 價格門檻：配件（耳機&其他）不套用，避免 AirTag 等低價品被濾掉 */
    if(matched.grp!=='耳機 & 其他'&&row.promoPrice<3000&&row.memberPrice<3000)continue;
    const excl=matched.grp==='Apple Watch'?EXCL_WATCH:EXCLUDE;if(excl.some(k=>row.name.includes(k)))continue;
    const conn=getConn(row.name);
    const spec=getSpec(row.name);
    if(matched.grp==='iPad'&&(conn==='LTE'||/[Cc]ellular/.test(row.name)))continue;
    /* iPad 容量篩選：mini / 11 只留 128/256；Air 只留 M4 的 128/256；Pro 只留 256/512 */
    if((matched.k==='iPad mini'||matched.k==='iPad 11')&&!['128G','256G'].includes(spec))continue;
    if(matched.lbl.startsWith('iPad Air')&&(!/M4/.test(row.name)||!['128G','256G'].includes(spec)))continue;
    if(matched.lbl.startsWith('iPad Pro')&&!['256G','512G'].includes(spec))continue;
    if((matched.k==='AW SE'||matched.k==='AW S11')&&conn==='LTE')continue;
    if(matched.k==='AW Ultra'){if(!spec.includes('米蘭')&&!spec.includes('海洋'))continue;}
    const lbl=matched.lbl;
    if(!grouped[lbl])grouped[lbl]={grp:matched.grp,lbl,specs:[],minPrice:Infinity,minOrig:Infinity,act:actMap[lbl]||''};
    const price=row.promoPrice,orig=row.memberPrice;
    const noSpecOk=matched.grp==='耳機 & 其他'||matched.grp==='Apple Watch';
    if(!spec&&!noSpecOk)continue;
    const key=spec+(conn?'|'+conn:'');
    if(!grouped[lbl].specs.find(s=>s.key===key))grouped[lbl].specs.push({key,spec,conn,price,orig});
    if(price<grouped[lbl].minPrice){grouped[lbl].minPrice=price;grouped[lbl].minOrig=orig;}
  }
  return grouped;
}
function fmt(n){return isFinite(n)?'$'+n.toLocaleString('zh-TW'):'—';}

const GRP_LABEL={'iPhone':'iPhone','Mac':'Mac','iPad':'iPad','Apple Watch':'Apple Watch','耳機 & 其他':'AirPods & AirTag'};

function colHTML(item){
  const actHTML=item.act?`<span class="pact" contenteditable="true">${item.act}</span>`:'';
  const specItems=item.specs.slice(0,6).map(s=>{
    const lbl=[s.spec,s.conn].filter(Boolean).join(' ');
    if(!lbl)return`<div class="pspec-item"><div class="pspec-price" contenteditable="true">${fmt(s.price)}</div>${s.orig>s.price?`<div class="pspec-orig" contenteditable="true">原 ${fmt(s.orig)}</div>`:''}<button class="spec-del" onclick="this.closest('.pspec-item').remove()">✕</button></div>`;
    return`<div class="pspec-item"><div class="pspec-label" contenteditable="true">${lbl}</div><div class="pspec-price" contenteditable="true">${fmt(s.price)}</div>${s.orig>s.price?`<div class="pspec-orig" contenteditable="true">原 ${fmt(s.orig)}</div>`:''}<button class="spec-del" onclick="this.closest('.pspec-item').remove()">✕</button></div>`;
  }).join('');
  return`<div class="pcol"><div class="pcol-head"><div class="pname" contenteditable="true">${item.lbl}</div>${actHTML}</div><div class="pcol-body"><div class="pspecs-grid">${specItems}</div><button class="spec-add" onclick="addSpec(this)">＋ 新增規格</button></div></div>`;
}

function buildGroupHTML(grouped,groups){
  const activeGroups=groups.filter(g=>Object.values(grouped).some(i=>i.grp===g));
  const multiGroup=activeGroups.length>1;
  let html='';
  for(const g of groups){
    const items=Object.values(grouped).filter(i=>i.grp===g);if(!items.length)continue;
    if(multiGroup)html+=`<div class="catrow" contenteditable="true">${GRP_LABEL[g]||g}</div>`;
    if(g==='iPad'){
      /* iPad 全頁兩兩並排，固定順序：mini｜11、Air11｜Air13、Pro11｜Pro13 */
      const order=['iPad mini','iPad 11"','iPad Air 11"','iPad Air 13"','iPad Pro 11"','iPad Pro 13"'];
      const sorted=items.slice().sort((a,b)=>{
        const ia=order.indexOf(a.lbl),ib=order.indexOf(b.lbl);
        return (ia<0?99:ia)-(ib<0?99:ib);
      });
      for(let i=0;i<sorted.length;i+=2){
        const a=sorted[i],b=sorted[i+1];
        if(b)html+=`<div class="pgrid-pair">${colHTML(a)}${colHTML(b)}</div>`;
        else html+=colHTML(a);
      }
    }else{
      items.forEach(item=>html+=colHTML(item));
    }
  }
  return html;
}

document.getElementById('pfi').addEventListener('change',async function(){
  const file=this.files[0];if(!file)return;
  const st=document.getElementById('pstat');st.textContent='解析中...';st.style.color='#888';
  try{
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let fullText='';
    for(let p=1;p<=pdf.numPages;p++){
      const pg=await pdf.getPage(p);const tc=await pg.getTextContent();
      const lineMap=new Map();
      for(const item of tc.items){
        const y=Math.round(item.transform[5]);let found=null;
        for(const [ky] of lineMap){if(Math.abs(ky-y)<=2){found=ky;break;}}
        const key=found!==null?found:y;
        if(!lineMap.has(key))lineMap.set(key,[]);
        lineMap.get(key).push({x:Math.round(item.transform[4]),str:item.str});
      }
      const sorted=[...lineMap.entries()].sort((a,b)=>b[0]-a[0]);
      for(const [,parts] of sorted){parts.sort((a,b)=>a.x-b.x);fullText+=parts.map(p=>p.str).join(' ')+'\n';}
    }
    const fname=file.name.replace('.pdf','');const dm=fname.match(/(\d{4})-(\d{4})/);
    const dateStr=dm?(()=>{const f=d=>`${d.slice(0,2)}/${d.slice(2)}`;return`${f(dm[1])} — ${f(dm[2])}`;})():'05/19 — 05/31';
    const grouped=parsePDF(fullText);
    document.getElementById('posters-wrap').innerHTML=POSTER_CFG.map(cfg=>makePoster(cfg,dateStr,buildGroupHTML(grouped,cfg.groups))).join('');
    applyStoredStyles();
    POSTER_CFG.forEach(cfg=>{posterScales[cfg.id]=100;const s=document.getElementById('pctrl-'+cfg.id);if(s)s.value=100;const v=document.getElementById('pctrl-val-'+cfg.id);if(v)v.textContent='100%';});
    document.querySelectorAll('.fstore,.sname').forEach(el=>el.textContent=_storeId);
    st.textContent='✓ '+file.name;st.style.color='#3DAB8A';
    document.fonts.ready.then(()=>fixAndFitPosters());
  }catch(e){st.textContent='⚠️ 解析失敗：'+e.message;st.style.color='#f44';console.error(e);}
});
